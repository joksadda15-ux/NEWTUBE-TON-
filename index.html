<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEWTUBE — Watch & Earn</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ══════════════════════════════════════════════════════════

<script type="text/javascript" src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>

<!-- ⚠️ The Monetag (libtl.com) SDK is intentionally NOT statically loaded here.
     This SDK attaches a global click listener as soon as the page loads (an
     aggressive monetization pattern), which caused Monetag's ad to fire even
     when clicking the GigaPub/Adsgram button. Now it's lazy-loaded — the
     script is only injected when the user actually clicks the Monetag
     button, see loadMonetagSDK() inside watchAdNetwork(). -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #070B14;
        --surface: #0E1626;
        --surface-raised: #142032;
        --surface-pop: #1A2A40;
        --coin: #2F7BFF;
        --coin-deep: #1E56C2;
        --coin-soft: rgba(47,123,255,0.16);
        --accent: #00D4FF;
        --accent-soft: rgba(0,212,255,0.16);
        --signal: #38BDF8;
        --signal-soft: rgba(56,189,248,0.12);
        --ink: #F0F5FF;
        --ink-muted: #8CA0C4;
        --ink-faint: #56658A;
        --border: rgba(240,245,255,0.07);
        --border-strong: rgba(240,245,255,0.14);
        --danger: #FF5C7A;
        --danger-soft: rgba(255,92,122,0.14);
        --success: #22C55E;
        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); }
    body {
        color: var(--ink);
        font-family: var(--font-body);
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 96px;
        overflow-x: hidden;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    .hidden { display: none !important; }
    img { max-width: 100%; display: block; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 8px; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(155deg, #7FB4FF, var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -2px 4px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: #FFFFFF; }
    .brand-name { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: 0.2px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: none; display: flex; align-items: center; justify-content: center; color: var(--ink); position: relative; }
    .icon-btn.has-dot::after { content: ''; position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }

    .card { background: linear-gradient(160deg, var(--surface-raised), var(--surface)); border-radius: 16px; padding: 16px 18px; border: 0.5px solid var(--border); box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 10px 24px rgba(0,0,0,0.28); }
    .btn { height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; font-size: 14px; border: none; width: 100%; transition: transform 0.12s ease, box-shadow 0.12s ease; }
    .btn-primary { background: linear-gradient(160deg, #7FB4FF, var(--coin) 55%, var(--coin-deep)); color: #FFFFFF; box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -3px 6px rgba(0,0,0,0.25), 0 10px 22px rgba(47,123,255,0.35); }
    .btn-primary:active { transform: translateY(2px) scale(0.99); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), inset 0 -1px 3px rgba(0,0,0,0.25), 0 4px 10px rgba(47,123,255,0.25); }
    .btn-outline { background: transparent; border: 0.5px solid var(--border-strong); color: var(--ink); }
    .btn-outline:active { transform: translateY(1px); background: rgba(255,255,255,0.03); }
    .btn-signal { background: var(--signal); color: #04070D; }
    .btn:disabled { opacity: 0.45; }
    .section-pad { padding: 0 20px; }
    .section-title { font-size: 15px; font-weight: 600; }
    .muted { color: var(--ink-muted); }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .pill-signal { background: var(--signal-soft); color: var(--signal); }
    .pill-coin { background: var(--coin-soft); color: var(--coin); }

    .bottomnav { position: fixed; bottom: 14px; left: 0; right: 0; max-width: 440px; margin: 0 auto; background: var(--surface-raised); border-radius: 22px; display: flex; align-items: center; justify-content: space-around; padding: 10px 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.45); z-index: 40; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ink-faint); width: 56px; background: none; border: none; padding: 4px 0; }
    .nav-item.active { color: var(--coin); }
    .nav-label { font-size: 10px; font-weight: 500; }
    .nav-earn { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(155deg, #7FB4FF, var(--coin) 55%, var(--coin-deep)); display: flex; align-items: center; justify-content: center; margin-top: -28px; box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -4px 8px rgba(0,0,0,0.25), 0 8px 20px rgba(47,123,255,0.45); color: #FFFFFF; }

    #toast-host { position: fixed; top: 14px; left: 0; right: 0; max-width: 430px; margin: 0 auto; z-index: 200; pointer-events: none; padding: 0 16px; }
    .toast { background: var(--surface-pop); border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: toast-in 0.25s ease; }
    .toast.success { border-color: rgba(93,202,165,0.4); }
    .toast.error { border-color: rgba(255,92,122,0.4); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .overlay { position: fixed; inset: 0; background: rgba(10,9,12,0.78); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: 22px 22px 0 0; padding: 22px 20px 28px; max-height: 86vh; overflow-y: auto; }
    .sheet-fullscreen { width: 100%; max-width: 480px; background: var(--bg); border-radius: 0; padding: 0; max-height: 100vh; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sheet-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 4px; margin: 0 auto 16px; }
    .field-label { font-size: 13px; color: var(--ink-muted); margin: 14px 0 6px; }
    .field-input { width: 100%; height: 46px; border-radius: 12px; background: var(--surface-raised); border: 0.5px solid var(--border); color: var(--ink); padding: 0 14px; font-size: 14px; }

    /* ══════════════════════════════════════════════════════════
       ANIMATION SYSTEM — lightweight CSS keyframes + canvas particles.
       Kept GPU-cheap (transform/opacity only) so it stays smooth on
       mid-range Android devices inside the Telegram WebView.
       ══════════════════════════════════════════════════════════ */

    /* ── splash screen ── */
    #splash { position: fixed; inset: 0; background: radial-gradient(circle at 50% 38%, #0E1830 0%, var(--bg) 68%); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, transform 0.5s ease; }
    #splash.out { opacity: 0; transform: scale(1.06); pointer-events: none; }
    .splash-orbit { position: absolute; width: 208px; height: 208px; border-radius: 50%; border: 1px solid rgba(47,123,255,0.16); animation: splash-orbit-spin 7s linear infinite; z-index: 0; }
    .splash-orbit::before, .splash-orbit::after { content: ''; position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--coin); box-shadow: 0 0 10px rgba(47,123,255,0.9); }
    .splash-orbit::before { top: -3px; left: 50%; margin-left: -3px; }
    .splash-orbit::after { bottom: -3px; left: 50%; margin-left: -3px; background: var(--signal); box-shadow: 0 0 10px rgba(56,189,248,0.9); }
    @keyframes splash-orbit-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .splash-badge { position: relative; width: 88px; height: 88px; border-radius: 26px; display: flex; align-items: center; justify-content: center; background: linear-gradient(155deg, #16233D, #05070D); box-shadow: inset 0 1px 1px rgba(255,255,255,0.08), inset 0 -8px 16px rgba(0,0,0,0.5), 0 20px 44px rgba(0,0,0,0.55); animation: splash-pop 0.7s cubic-bezier(.34,1.56,.64,1); z-index: 1; }
    .splash-badge-inner { width: 100%; height: 100%; border-radius: 26px; display: flex; align-items: center; justify-content: center; background: linear-gradient(155deg, rgba(47,123,255,0.18), rgba(47,123,255,0.02) 65%); color: var(--coin); position: relative; overflow: hidden; }
    .splash-badge-inner .splash-play { filter: drop-shadow(0 0 10px rgba(47,123,255,0.65)); position: relative; z-index: 1; }
    .splash-badge-sheen { position: absolute; inset: -40% -10%; background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.14) 50%, transparent 60%); transform: translateX(-120%); animation: splash-sheen-sweep 2.4s ease-in-out 0.4s infinite; }
    @keyframes splash-sheen-sweep { 0% { transform: translateX(-130%); } 45%,100% { transform: translateX(130%); } }
    .splash-badge::before, .splash-badge::after { content: ''; position: absolute; inset: -7px; border-radius: 32px; border: 1.5px solid var(--coin); opacity: 0; animation: splash-ring 2s ease-out infinite; }
    .splash-badge::after { animation-delay: 0.65s; }
    @keyframes splash-pop { 0% { transform: scale(0) rotate(-25deg); opacity: 0; } 60% { transform: scale(1.15) rotate(4deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes splash-ring { 0% { transform: scale(1); opacity: 0.55; } 100% { transform: scale(1.55); opacity: 0; } }
    .splash-name { margin-top: 20px; font-family: var(--font-display); font-weight: 700; font-size: 21px; letter-spacing: 0.5px; opacity: 0; animation: fade-up 0.6s ease 0.35s forwards; }
    .splash-name .accent { color: var(--coin); text-shadow: 0 0 16px rgba(47,123,255,0.5); }
    .splash-tagline { margin-top: 6px; font-size: 12px; color: var(--ink-muted); opacity: 0; animation: fade-up 0.6s ease 0.5s forwards; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── generic entrance utilities ── */
    .anim-in { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) both; }
    .anim-in-2 { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) 0.06s both; }
    .anim-in-3 { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) 0.12s both; }
    .anim-in-4 { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) 0.18s both; }
    @keyframes rise-in { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .tab-fade { animation: tab-fade 0.32s ease both; }
    @keyframes tab-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── balance card shimmer + breathing coin ring ── */
    .coin-ring-spin { animation: ring-breathe 4s ease-in-out infinite; }
    @keyframes ring-breathe { 0%,100% { transform: scale(1) rotate(0deg); opacity: 0.18; } 50% { transform: scale(1.08) rotate(8deg); opacity: 0.28; } }
    .shimmer-sweep { position: absolute; inset: 0; background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.07) 50%, transparent 70%); transform: translateX(-100%); animation: sweep 2.6s ease-in-out infinite; pointer-events: none; }
    @keyframes sweep { 0% { transform: translateX(-120%); } 60%,100% { transform: translateX(120%); } }
    .count-pop { display: inline-block; animation: count-pop 0.35s ease; }
    @keyframes count-pop { 0% { transform: scale(1.18); color: var(--coin); } 100% { transform: scale(1); } }

    /* ── floating lootbox ── */
    #floating-lootbox { transition: transform 0.2s ease; animation: lootbox-bob 2.4s ease-in-out infinite; }
    #floating-lootbox:active { transform: scale(0.9); }
    @keyframes lootbox-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    #floating-lootbox.claimable { animation: lootbox-bob 2.4s ease-in-out infinite, lootbox-pulse 1.6s ease-in-out infinite; }
    @keyframes lootbox-pulse { 0%,100% { box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(47,123,255,0.5); } 50% { box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 10px rgba(47,123,255,0); } }
    #lb-coin-icon { transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); }
    #floating-lootbox.claimable #lb-coin-icon { animation: coin-flip 1.8s ease-in-out infinite; }
    .lb-claim-hint { position: fixed; z-index: 51; display: flex; align-items: center; gap: 6px; pointer-events: none; animation: lb-hint-bob 1.4s ease-in-out infinite; }
    .lb-claim-hint-bubble { background: linear-gradient(160deg, var(--signal), var(--coin) 70%); color: #06120A; font-weight: 700; font-size: 11.5px; padding: 5px 10px; border-radius: 999px; white-space: nowrap; box-shadow: 0 6px 14px rgba(0,0,0,0.35); }
    .lb-claim-hint-arrow { font-size: 20px; transform: rotate(90deg); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35)); }
    @keyframes lb-hint-bob { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-6px); } }
    @keyframes coin-flip { 0%,100% { transform: scale(1) rotate(0); } 50% { transform: scale(1.15) rotate(8deg); } }
    .lb-gain-float { position: fixed; font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--coin); z-index: 51; pointer-events: none; animation: gain-float 1.1s ease-out forwards; }
    @keyframes gain-float { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 20% { opacity: 1; transform: translateY(-8px) scale(1); } 100% { opacity: 0; transform: translateY(-38px) scale(1); } }

    /* ── buttons: tactile press feedback ── */
    .btn, .nav-item, .icon-btn, .video-thumb { transition: transform 0.12s ease, opacity 0.12s ease; }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .nav-item:active, .icon-btn:active { transform: scale(0.88); }
    .video-thumb:active { transform: scale(0.97); }
    .nav-earn { transition: transform 0.25s cubic-bezier(.34,1.56,.64,1); }
    .nav-item.active .nav-earn { transform: scale(1.08); }

    /* ── onboarding step transition ── */
    .ob-slide-in { animation: ob-slide-in 0.4s cubic-bezier(.22,.9,.32,1) both; }
    @keyframes ob-slide-in { from { opacity: 0; transform: translateX(26px); } to { opacity: 1; transform: translateX(0); } }
    .ob-icon-wrap { width: 90px; height: 90px; border-radius: 50%; background: var(--coin-soft); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; position: relative; }
    .ob-icon-wrap::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid var(--coin); opacity: 0.5; animation: ob-ring 2.2s ease-out infinite; }
    @keyframes ob-ring { 0% { transform: scale(0.85); opacity: 0.6; } 100% { transform: scale(1.25); opacity: 0; } }
    .ob-icon { font-size: 40px; animation: ob-icon-bounce 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both; }
    @keyframes ob-icon-bounce { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }

    /* ── join-gate (entry / "join channel & community" screen) ── */
    .jg-glow { position: absolute; inset: 0; overflow: hidden; border-radius: inherit; pointer-events: none; z-index: 0; }
    .jg-glow::before, .jg-glow::after { content: ''; position: absolute; width: 220px; height: 220px; border-radius: 50%; filter: blur(48px); opacity: 0.35; animation: jg-glow-drift 6s ease-in-out infinite; }
    .jg-glow::before { background: var(--coin); top: -80px; left: -60px; }
    .jg-glow::after { background: var(--accent); bottom: -90px; right: -60px; animation-delay: 1.4s; }
    @keyframes jg-glow-drift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(14px,-10px) scale(1.12); } }
    .jg-icon-wrap { width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; background: linear-gradient(150deg, var(--coin-soft), var(--accent-soft)); z-index: 1; }
    .jg-icon-wrap::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; background: conic-gradient(from 0deg, var(--coin), var(--accent), var(--signal), var(--coin)); opacity: 0.55; animation: jg-ring-spin 3.5s linear infinite; z-index: -1; }
    .jg-icon-wrap::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--surface); z-index: -1; }
    @keyframes jg-ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .jg-icon { font-size: 42px; position: relative; z-index: 1; animation: ob-icon-bounce 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both; }
    .jg-row { display: flex; gap: 10px; margin-bottom: 12px; opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) forwards; }
    .jg-row:nth-of-type(1) { animation-delay: 0.05s; }
    .jg-row:nth-of-type(2) { animation-delay: 0.15s; }
    @keyframes jg-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .jg-link-card { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 10px; border-radius: 16px; border: 1px solid var(--border-strong); background: linear-gradient(160deg, var(--surface-raised), var(--surface)); text-decoration: none; color: var(--ink); transition: transform 0.12s ease, border-color 0.15s ease; }
    .jg-link-card:active { transform: translateY(2px) scale(0.98); }
    .jg-link-card.jg-channel { border-color: rgba(47,123,255,0.35); }
    .jg-link-card.jg-community { border-color: rgba(56,189,248,0.35); }
    .jg-link-icon { font-size: 22px; }
    .jg-link-label { font-size: 12px; font-weight: 600; }
    .jg-check-btn { opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) 0.28s forwards; background: linear-gradient(160deg, var(--accent), var(--coin) 60%, var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -3px 6px rgba(0,0,0,0.25), 0 10px 24px rgba(56,189,248,0.3); }

    /* ── gift-box (admin surprise gift) ── */
    .gb-glow { position: absolute; inset: 0; overflow: hidden; border-radius: inherit; pointer-events: none; z-index: 0; }
    .gb-glow::before, .gb-glow::after { content: ''; position: absolute; width: 240px; height: 240px; border-radius: 50%; filter: blur(52px); opacity: 0.4; animation: jg-glow-drift 5s ease-in-out infinite; }
    .gb-glow::before { background: var(--coin); top: -90px; left: -70px; }
    .gb-glow::after { background: var(--signal); bottom: -100px; right: -70px; animation-delay: 1.2s; }
    .gb-rays { position: absolute; inset: 0; z-index: 0; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
    .gb-rays::before { content: ''; position: absolute; width: 260px; height: 260px; background: conic-gradient(from 0deg, transparent 0deg, var(--signal) 4deg, transparent 10deg, transparent 40deg, var(--coin) 44deg, transparent 50deg, transparent 80deg, var(--signal) 84deg, transparent 90deg, transparent 130deg, var(--coin) 134deg, transparent 140deg, transparent 190deg, var(--signal) 194deg, transparent 200deg, transparent 260deg, var(--coin) 264deg, transparent 270deg, transparent 320deg, var(--signal) 324deg, transparent 330deg); animation: gb-ray-spin 8s linear infinite; }
    @keyframes gb-ray-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .gb-box-wrap { width: 112px; height: 112px; margin: 6px auto 18px; position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
    .gb-box { font-size: 60px; animation: gb-bounce 1.6s ease-in-out infinite; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.4)); }
    @keyframes gb-bounce { 0%,100% { transform: translateY(0) rotate(-3deg); } 25% { transform: translateY(-3px) rotate(2deg); } 50% { transform: translateY(-10px) rotate(-2deg); } 75% { transform: translateY(-3px) rotate(3deg); } }
    .gb-reason-card { position: relative; z-index: 1; text-align: left; background: linear-gradient(160deg, var(--surface-raised), var(--surface)); border: 1px solid var(--border-strong); border-radius: 14px; padding: 12px 14px; margin-bottom: 18px; opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) 0.15s forwards; }
    .gb-reason-label { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .gb-reason-text { font-size: 13.5px; line-height: 1.5; }
    .gb-claim-btn { opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) 0.28s forwards; background: linear-gradient(160deg, var(--signal), var(--coin) 60%, var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -3px 6px rgba(0,0,0,0.25), 0 10px 24px var(--coin-soft); }

<script>

// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const API_BASE = 'https://newtube-ton.vercel.app/api';

// They are never sent to the backend as a trusted identity — every API call

    const u = tg?.initDataUnsafe?.user;

// ══════════════════════════════════════════════════════════════
// AD NETWORK SDK WRAPPERS — real calls, each resolves only after

// This replaces click-to-instant-reward — the reward call only fires

// ══════════════════════════════════════════════════════════════
const showAdsgramDailyAd = () => new Promise((res, rej) => {

    else { rej(new Error('sdk_not_loaded')); }
});
const showAdsgramSpecialAd = () => new Promise((res, rej) => {
    if (window.Adsgram) { window.Adsgram.init({ blockId: "27566" }).show().then(res).catch(rej); }
    else { rej(new Error('sdk_not_loaded')); }

// ⚠️ The Monetag SDK is now lazy-loaded — the script is only injected when
// the user actually clicks the Monetag button, and it's removed again once
// done. This way Monetag's global click-listener simply isn't present on
// the page when clicking GigaPub/Adsgram, so it can no longer hijack clicks
// meant for other networks.
let _monetagLoading = null;
let _monetagInFlight = 0; // ⚠️ mutex-style counter — see showMonetagAd() below
function loadMonetagSDK() {
    if (typeof show_9442539 === 'function') return Promise.resolve();
    if (_monetagLoading) return _monetagLoading;
    _monetagLoading = new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = '//libtl.com/sdk.js';
        s.setAttribute('data-zone', '9442539');
        s.setAttribute('data-sdk', 'show_9442539');
        s.onload = () => {
            // ⚠️ FIX: `onload` only means the script finished *downloading* —
            // Monetag's SDK does its own internal async setup afterwards and
            // `show_9442539` isn't necessarily defined the instant onload
            // fires. Calling it too early meant every single Monetag attempt
            // failed with 'sdk_not_loaded', so no ad ever played and no
            // reward was ever given. Now we poll briefly (up to 5s) for the
            // function to actually exist before resolving.
            const startedAt = Date.now();
            const poll = () => {
                if (typeof show_9442539 === 'function') { res(); return; }
                if (Date.now() - startedAt > 5000) { _monetagLoading = null; rej(new Error('monetag_sdk_init_timeout')); return; }
                setTimeout(poll, 100);
            };
            poll();
        };
        s.onerror = () => { _monetagLoading = null; rej(new Error('monetag_sdk_load_failed')); };
        document.head.appendChild(s);
    });
    return _monetagLoading;
}
function unloadMonetagSDK() {
    // ⚠️ FIX: the passive video-section interstitial and the rewarded Earning-tab
    // button used to share this exact same SDK instance with no coordination —
    // if both fired close together, one's cleanup could rip the script out from
    // under the other mid-call. `_monetagInFlight` tracks how many callers are
    // currently using the SDK; only the last one out actually unloads it.
    if (_monetagInFlight > 0) return;
    document.querySelectorAll('script[src*="libtl.com"]').forEach(s => s.remove());
    try { delete window.show_9442539; } catch { window.show_9442539 = undefined; }
    _monetagLoading = null;
}
const showMonetagAd = () => {
    _monetagInFlight++;
    const release = () => { _monetagInFlight = Math.max(0, _monetagInFlight - 1); };
    return loadMonetagSDK().then(() => new Promise((res, rej) => {
        if (typeof show_9442539 !== 'function') { rej(new Error('sdk_not_loaded')); return; }
        // ⚠️ A 90-second safety-net is kept only for Monetag (per the user's
        // request) — in case the SDK ever gets stuck (never resolves or rejects).
        const t = setTimeout(() => rej(new Error('timeout')), 90000);
        show_9442539().then(() => { clearTimeout(t); res(); }).catch((e) => { clearTimeout(t); rej(e); });
    })).finally(() => { release(); unloadMonetagSDK(); });
};
const showGigaPubAd = () => new Promise((res, rej) => {
    // ⚠️ Strictly only checks GigaPub's own function — no other network's
    // SDK (Monetag, etc.) is ever called here as a fallback. If GigaPub's

    window.showGiga("main").then(res).catch(rej);
});

// ══════════════════════════════════════════════════════════════
// API helpers — apiPost automatically attaches the signed Telegram
// initData to every request, so individual call sites never need to

async function apiPost(path, body = {}) {

// ══════════════════════════════════════════════════════════════
// PARTICLE BURST — lightweight canvas confetti for reward moments
// (claim lootbox, ad reward, task complete, withdraw, promo redeem).
// Self-contained, auto-clears after ~1s — never blocks interaction.
// ══════════════════════════════════════════════════════════════
const burstCanvas = document.getElementById('burst-canvas');
const burstCtx = burstCanvas.getContext('2d');
function resizeBurstCanvas() { burstCanvas.width = window.innerWidth; burstCanvas.height = window.innerHeight; }
resizeBurstCanvas();
window.addEventListener('resize', resizeBurstCanvas);

function triggerBurst(originEl) {
    const rect = originEl ? originEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 };
    const ox = rect.left + rect.width / 2;
    const oy = rect.top + rect.height / 2;
    const colors = ['#2F7BFF', '#38BDF8', '#22C55E', '#F0F5FF'];
    const particles = Array.from({ length: 26 }, () => {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2.5 + Math.random() * 4.5;
        return { x: ox, y: oy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2, size: 3 + Math.random() * 4, color: colors[Math.floor(Math.random() * colors.length)], life: 1 };
    });
    let frame = 0;
    function tick() {
        frame++;
        burstCtx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.life <= 0) return;
            p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life -= 0.022;
            if (p.life > 0) {
                alive = true;
                burstCtx.globalAlpha = Math.max(p.life, 0);
                burstCtx.fillStyle = p.color;
                burstCtx.beginPath(); burstCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); burstCtx.fill();
            }
        });
        burstCtx.globalAlpha = 1;
        if (alive && frame < 90) requestAnimationFrame(tick);
        else burstCtx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
    }
    tick();
}

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
// COUNT-UP — animates a number from its current value to a new target
// ══════════════════════════════════════════════════════════════
function animateCountUp(el, from, to, duration = 700) {
    if (!el) return;
    const start = performance.now();
    const diff = to - from;
    function step(now) {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        el.textContent = fmtWTC(from + diff * eased);
        if (t < 1) requestAnimationFrame(step);
        else el.textContent = fmtWTC(to);
    }
    requestAnimationFrame(step);
}

const HISTORY_STATUS_UI = {

    approved: { label: 'Received', icon: '✅', color: 'var(--success)' },

async function openHistoryModal() {
    const root = document.getElementById('modal-root');
    root.innerHTML = `
        <div class="overlay">
            <div class="sheet" style="max-height:78vh; display:flex; flex-direction:column;">

        </div>`;

    try {
        const r = await apiGet(`withdraw?action=history&initData=${encodeURIComponent(TG_INIT_DATA)}`);
        const listEl = document.getElementById('history-list');
        if (!listEl) return; // modal closed before response arrived

        // ⚠️ FIX: previously r.history was filtered directly without checking
        // r.ok first — so any auth/server error silently showed "no requests"
        // instead, and the real cause was never visible. Errors are now shown
        // explicitly and separately.
        if (!r.ok) {
            console.error('history fetch failed:', r.error, r.reason);
            listEl.innerHTML = `<div class="muted" style="text-align:center; padding:30px 0;">Couldn't load history (${r.error || 'unknown'}). Close the app and reopen it.</div>`;
            return;
        }

        const items = (r.history || []).filter(h => h.status === 'pending' || h.status === 'approved');

        if (!items.length) {
            listEl.innerHTML = `<div class="muted" style="text-align:center; padding:30px 0;">No withdraw requests yet.</div>`;
            return;
        }

        listEl.innerHTML = items.map((h, i) => {
            const st = HISTORY_STATUS_UI[h.status] || { label: h.status, icon: '•', color: 'var(--ink-muted)' };
            const date = h.createdAt ? new Date(h.createdAt).toLocaleString() : '';
            return `
                <div class="card" style="margin-bottom:10px; opacity:0; animation: jg-rise 0.35s ease ${Math.min(i * 0.05, 0.4)}s forwards;">
                    <div style="display:flex; align-items:center; justify-content:space-between;">

                            ${st.icon} ${st.label}
                        </div>
                    </div>
                </div>`;
        }).join('');
    } catch (e) {
        const listEl = document.getElementById('history-list');
        if (listEl) listEl.innerHTML = `<div class="muted" style="text-align:center; padding:30px 0;">Failed to load history.</div>`;
    }
}

let _tickerInterval = null;
async function startWithdrawTicker() {
    if (_tickerInterval) { clearInterval(_tickerInterval); _tickerInterval = null; }
    const textEl = document.getElementById('wd-ticker-text');
    if (!textEl) return;

    let items = [];
    try {
        const r = await apiGet('data?type=recentWithdrawals');
        items = r.items || [];
    } catch { /* ignore — ticker just won't show */ }

    const liveTextEl = document.getElementById('wd-ticker-text'); // re-check, tab may have switched during fetch
    if (!liveTextEl) return;

    if (!items.length) {
        liveTextEl.textContent = '💸 Withdraw your earnings straight to TON/USDT!';
        return;
    }

    let idx = 0;
    const show = (i) => {
        const el = document.getElementById('wd-ticker-text');
        if (!el) { clearInterval(_tickerInterval); _tickerInterval = null; return; }
        const w = items[i];
        el.style.opacity = '0';
        setTimeout(() => {
            const el2 = document.getElementById('wd-ticker-text');
            if (!el2) return;
            el2.textContent = `${w.username} just withdrew ${Number(w.cashAmount).toFixed(2)} ${w.currency} 🎉`;
            el2.style.opacity = '1';
        }, 350);
    };
    show(idx);
    _tickerInterval = setInterval(() => { idx = (idx + 1) % items.length; show(idx); }, 3500);
}

let sessionEarnedTotal = 0;
let sessionDisplayWTC = 0; // visual only — increments every 10s for mining feel
let videoWatchSeconds = 0;
let lastMonetagInterstitialAt = 0;

function updateLootboxFullUI(isFull) {
    const banner = document.getElementById('vp-lootbox-full-banner');
    const sub = document.getElementById('vp-session-sub');
    if (!banner || !sub) return;
    banner.style.display = isFull ? 'block' : 'none';
    sub.textContent = isFull ? 'Paused — claim your lootbox to resume earning' : '40 WTC earned per hour watched';
}

async function startVideoSession() {
    sessionEarnedTotal = 0;
    sessionDisplayWTC = 0;
    videoWatchSeconds = 0;
    lastMonetagInterstitialAt = 0;
    const startRes = await apiPost('earn', { action: 'videoStart', userId: USER_ID });
    if (!startRes.success) { toast(errorText(startRes.error), 'error'); return; }
    state.videoSession = { startTime: startRes.startTime, signature: startRes.signature };
    updateLootboxFullUI((state.user?.pendingVideoWTC || 0) >= 25);

    // ── Visual counter: every 10 seconds, adds 0.111 WTC (= 40 WTC/hr / 360 ticks/hr)
    // This is purely for display — it makes the UI feel like a miner ticking up.
    // The real WTC is only credited by the 30-second backend call below.
    // ⚠️ FIX: this used to keep climbing even after the backend stopped crediting
    // (once pendingVideoWTC hits the 25 WTC claim threshold), so the video page
    // could show e.g. "60 WTC" for a full hour watched while the real claimable
    // amount silently capped out much lower — a confusing "where did my WTC go"
    // moment when the user went back to actually claim. Now the ticker freezes
    // (and shows the same lootbox-full banner) the instant the real cap is hit,
    // so the number on screen is always the number they'll actually get.
    state.videoDisplayInterval = setInterval(() => {
        if (!state.videoSession) return;
        if ((state.user?.pendingVideoWTC || 0) >= 25) { updateLootboxFullUI(true); return; }
        sessionDisplayWTC = parseFloat((sessionDisplayWTC + 0.111).toFixed(3));
        const out = document.getElementById('vp-session-wtc');
        if (out) out.textContent = `${sessionDisplayWTC.toFixed(1)} WTC`;
    }, 10000);

    // ── Backend API: every 30 seconds, actually credits WTC to pendingVideoWTC ──
    state.videoSessionInterval = setInterval(async () => {
        if (!state.videoSession) return;
        videoWatchSeconds += 30;

        // Passive Monetag interstitial every 10 minutes — no reward, just passive monetization
        if (videoWatchSeconds - lastMonetagInterstitialAt >= MONETAG_INTERVAL_SECONDS) {
            lastMonetagInterstitialAt = videoWatchSeconds;
            try { showMonetagAd(); } catch (e) { /* non-blocking */ }
        }

        const elapsedSec = Math.floor((Date.now() - state.videoSession.startTime) / 1000);
        const claimable = Math.floor(elapsedSec * (1 / 60));
        if (claimable <= 0) return;

        // ⚠️ NEW: once 25+ WTC is already sitting unclaimed in the lootbox, the
        // backend won't credit more anyway — skip the call, keep the video
        // session alive (so it resumes right after they claim), and nudge them
        // once (not every 30s, to avoid spamming toasts).
        if ((state.user?.pendingVideoWTC || 0) >= 25) {
            updateLootboxFullUI(true);
            if (!state._lootboxNudgeShown) {
                state._lootboxNudgeShown = true;
                toast('🎁 Your lootbox is full — claim it to keep earning!', 'info');
            }
            return;
        }
        updateLootboxFullUI(false);

        const r = await apiPost('earn', { action: 'videoClaim', startTime: state.videoSession.startTime, signature: state.videoSession.signature, claimedPoints: claimable });
        if (r.ok) {
            sessionEarnedTotal += claimable;
            // Sync display to actual earned value after each real credit
            sessionDisplayWTC = Math.max(sessionDisplayWTC, sessionEarnedTotal);
            const out = document.getElementById('vp-session-wtc');
            if (out) out.textContent = `${sessionDisplayWTC.toFixed(1)} WTC`;
            if (state.user) state.user.pendingVideoWTC = r.pendingVideoWTC;
            renderFloatingLootbox();
            showLootboxGain(claimable);
            const fresh = await apiPost('earn', { action: 'videoStart', userId: USER_ID });
            if (fresh.success) state.videoSession = { startTime: fresh.startTime, signature: fresh.signature };
        } else if (r.error === 'lootbox_claim_required') {
            updateLootboxFullUI(true);
            if (!state._lootboxNudgeShown) {
                state._lootboxNudgeShown = true;

async function watchAdNetwork(network) {

        // A network-specific, explicit message — a different network's ad is
        // never played instead; on failure the user is told directly to try
        // again or pick a different option.
        toast(`${networkLabel} ad isn't available right now. Please try again or pick a different network.`, 'error');

async function creditAdReward(network) {

function taskCardHtml(t) {
    const verified = t.category === 'channel';
    const isFaucet = t.category === 'faucet';
    return `
    <div class="card task-card" data-task-card="${t._id}" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">

            </div>
            <div style="font-weight:500; font-size:14px;">${t.title}</div>
            <div class="muted" style="font-size:12px; margin-top:2px;">+${t.rewardWtc || 0} WTC</div>

        <button class="btn btn-primary" style="width:auto; padding:0 16px;" data-task="${t._id}" data-url="${t.url || ''}" data-category="${t.category || 'partner'}">Go</button>
    </div>`;
}

function goToTask(taskId, url, category) {
    // Open the link first
    if (url) window.open(url, '_blank');

    // Then show the claim/verify sheet — user must actively press Claim
    const task = state.tasks.find(t => t._id === taskId);
    const isVerified = category === 'channel';

    document.getElementById('modal-root').innerHTML = `
        <div class="overlay" onclick="if(event.target===this)this.remove()">
            <div class="sheet anim-in">
                <div class="sheet-handle"></div>
                <div style="font-weight:600; font-size:16px; margin-bottom:6px;">${task?.title || 'Task'}</div>
                <div class="muted" style="font-size:13px; margin-bottom:18px;">
                    ${isVerified
                        ? 'After joining the channel/group, tap Verify below. Our server will check your membership.'
                        : 'After completing the task above, tap Claim to receive your reward.'}
                </div>
                ${isVerified ? `
                    <button class="btn btn-signal" id="task-verify-btn" style="margin-bottom:10px;">
                        ✅ Verify Membership
                    </button>` : `
                    <button class="btn btn-primary" id="task-claim-btn" style="margin-bottom:10px;" disabled>
                        🎁 Claim in <span id="task-claim-countdown">10</span>s
                    </button>`}
                <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">
                    Cancel
                </button>
            </div>
        </div>`;

    const actionBtn = document.getElementById('task-verify-btn') || document.getElementById('task-claim-btn');
    if (actionBtn) {
        actionBtn.onclick = async () => {
            actionBtn.disabled = true;
            actionBtn.textContent = 'Checking...';
            await completeTask(taskId);
        };
    }

    // ⚠️ Soft anti-abuse friction (matches the read→wait→claim pattern from
    // reference apps) — link-based tasks can't be server-verified (we can't
    // confirm someone actually visited an external site), so this at least
    // stops instant claim-without-clicking. It's not real verification, just
    // a reasonable minimum.
    const claimBtn = document.getElementById('task-claim-btn');
    if (claimBtn) {
        let remaining = 10;
        const countdownEl = document.getElementById('task-claim-countdown');
        const timer = setInterval(() => {
            remaining--;
            if (!document.getElementById('task-claim-countdown')) { clearInterval(timer); return; }
            if (remaining <= 0) {
                clearInterval(timer);
                claimBtn.disabled = false;
                claimBtn.innerHTML = '🎁 Claim Reward';
            } else {
                countdownEl.textContent = remaining;
            }
        }, 1000);
    }
}

async function completeTask(taskId) {
    const r = await apiPost('earn', { action: 'taskComplete', taskId });
    document.getElementById('modal-root').innerHTML = ''; // close sheet
    if (r.ok) {
        toast(`+${r.rewardWtc} WTC added!`, 'success');
        triggerBurst(document.querySelector(`button[data-task="${taskId}"]`) || document.body);
        showCongrats(`+${r.rewardWtc} WTC`, '✅');
        await refreshUser();

        // 🎁 Second revenue stream for article tasks: fire a passive ad after
        // claiming (result ignored — this isn't tied to the user's reward,
        // it's just an extra impression for us). Same pattern as the video
        // section's periodic passive interstitial.
        const claimedTask = (state.tasks || []).find(t => t._id === taskId);
        if (claimedTask?.category === 'article') {
            showMonetagAd().catch(() => {});
        }

        // ── Vanishes the completed task's card with an animation, then refreshes the list ──
        const refreshActiveTab = () => {
            if (state.activeTab === 'earning') renderEarningTab();
            else if (state.activeTab === 'task') renderTaskTab();
        };
        const card = document.querySelector(`[data-task-card="${taskId}"]`);
        if (card) {
            card.classList.add('task-vanish');
            setTimeout(refreshActiveTab, 480);
        } else {
            refreshActiveTab();
        }
    }
    else if (r.alreadyDone) { toast('You already completed this task.', 'info'); }
    else if (r.error === 'not_member') { toast('Not a member yet — join first, then verify.', 'error'); }
    else { toast(errorText(r.error), 'error'); }
}

async function refreshUser() {
    const r = await apiGet(`user?action=profile&initData=${encodeURIComponent(TG_INIT_DATA)}`);
    if (r.ok) {
        state.user = r.user;
        // Ban gate — if user is banned, show ban screen and stop everything
        if (r.user?.isBanned) {
            document.getElementById('app-root').innerHTML = '';
            const appealUrl = `https://t.me/NewTube12_bot?start=appeal_${USER_ID}`;
            document.getElementById('modal-root').innerHTML = `
                <div style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;z-index:999;">
                    <div style="font-size:52px;margin-bottom:20px;">⛔</div>
                    <div style="font-family:var(--font-display);font-weight:700;font-size:22px;margin-bottom:12px;">Account Banned</div>
                    <div style="color:var(--ink-muted);font-size:14px;line-height:1.7;margin-bottom:24px;">Your account has been banned for using multiple accounts on the same device.<br><br>If you believe this is a mistake, tap below to request a review from the admin.</div>
                    <a href="${appealUrl}" target="_blank" class="btn btn-primary" style="width:auto; padding:0 22px; text-decoration:none;">🆘 Request Review</a>
                </div>`;
            throw new Error('banned'); // stop further execution in init()
        }
    }
}

async function init() {
    const splashStart = performance.now();

    // ── Telegram-only gate ── matches the original app's behavior: wait briefly
    // for Telegram's WebApp bridge to deliver initData, and if it never does
    // (because this was opened in a regular browser, not via Telegram), block
    // entirely instead of silently falling back to a fake/demo identity.
    if (!hydrateDisplayUserFields()) {
        await new Promise(r => setTimeout(r, 800));
        if (!hydrateDisplayUserFields()) {
            await new Promise(r => setTimeout(r, 1500));
        }
    }
    if (!TG_INIT_DATA || !hydrateDisplayUserFields()) {
        document.getElementById('splash').remove();
        document.getElementById('app-root').innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; text-align:center; padding:0 30px;">
                <div style="font-size:48px;">📱</div>
                <div style="font-family:var(--font-display); font-weight:700; font-size:17px;">Open this in Telegram</div>
                <div class="muted" style="font-size:13px; line-height:1.6;">NEWTUBE only works inside the Telegram app. Please open it via the NEWTUBE bot.</div>
            </div>`;
        return;
    }

    await apiPost('user', { action: 'init', fingerprint: await generateDeviceFingerprint() });
    try {
        await refreshUser();
    } catch (e) {
        if (e.message === 'banned') {
            // Ban screen already shown in refreshUser() — remove splash and stop
            const splash = document.getElementById('splash');
            if (splash) { splash.classList.add('out'); setTimeout(() => splash.remove(), 550); }
            return;
        }
        throw e;
    }

    // Splash stays for at least 900ms so its entrance animation is always seen,
    // even when the network is fast — avoids an abrupt flash-then-gone feel.
    const elapsed = performance.now() - splashStart;
    if (elapsed < 900) await new Promise(r => setTimeout(r, 900 - elapsed));
    const splash = document.getElementById('splash');
    splash.classList.add('out');
    setTimeout(() => splash.remove(), 550);

    showOnboarding(async () => {
        const joinCheck = await apiGet(`user?action=checkJoin&initData=${encodeURIComponent(TG_INIT_DATA)}`);
        if (joinCheck.joined) startApp();
        else showJoinGate({ leftAfterVerifying: joinCheck.leftAfterVerifying }, startApp);
    });
}

function startApp() {
    renderShell();
    switchTab('home');
    startJoinWatcher();
    setTimeout(checkPendingGift, 900); // after the splash/home entrance animation, so the two don't show at once
}

async function generateDeviceFingerprint() {
    try {
        const parts = [];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 50;
        ctx.textBaseline = 'top'; ctx.font = '14px Arial'; ctx.fillStyle = '#f60'; ctx.fillRect(0, 0, 100, 20);
        ctx.fillStyle = '#069'; ctx.fillText('NEWTUBE-fp', 2, 15);
        parts.push(canvas.toDataURL());
        parts.push(screen.width + 'x' + screen.height + 'x' + screen.colorDepth);
        parts.push(navigator.language || '');
        parts.push(Intl.DateTimeFormat().resolvedOptions().timeZone || '');
        parts.push(navigator.hardwareConcurrency || '');
        const data = new TextEncoder().encode(parts.join('|||'));
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    } catch { return null; }
}

init();
