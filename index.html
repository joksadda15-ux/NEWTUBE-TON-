                    <img src="${v.thumbnail || ''}" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'">
                    <div style="position:absolute; right:6px; bottom:6px; background:rgba(0,0,0,0.65); border-radius:6px; padding:2px 6px; font-size:10px;">▶</div>
                </div>
                <div style="font-size:12px; font-weight:500; margin-top:6px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${v.title}</div>
            </div>`).join('');
        document.querySelectorAll('.video-thumb').forEach(el => { el.onclick = () => openVideoPlayer(state.videos[el.dataset.idx]); });
    }
    renderFloatingLootbox();
}

function renderFloatingLootbox() {
    let el = document.getElementById('floating-lootbox');
    if (!el) {
        el = document.createElement('button');
        el.id = 'floating-lootbox';
        el.style.cssText = 'position:fixed; right:18px; bottom:120px; width:64px; height:64px; border-radius:50%; background:var(--surface-raised); display:flex; align-items:center; justify-content:center; z-index:50; box-shadow:0 8px 20px rgba(0,0,0,0.4);';
        el.innerHTML = `
            <svg width="64" height="64" viewBox="0 0 64 64" style="position:absolute; inset:0; transform:rotate(-90deg);">
                <circle cx="32" cy="32" r="28" fill="none" stroke="var(--border-strong)" stroke-width="4"></circle>
                <circle id="lb-progress-ring" cx="32" cy="32" r="28" fill="none" stroke="var(--video-hue)" stroke-width="4" stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="176" style="transition: stroke-dashoffset 0.5s ease;"></circle>
            </svg>
            <div style="display:flex; flex-direction:column; align-items:center; position:relative; z-index:1;">
                <div style="font-size:15px;" id="lb-coin-icon">🪙</div>
                <div id="lb-amount" style="font-family:var(--font-display); font-weight:700; font-size:11px;">0</div>
            </div>`;
        document.body.appendChild(el);
        el.onclick = tryClaimLootbox;
    }
    const pending = state.user?.pendingVideoWTC || 0;
    const claimable = pending >= 25;
    const pct = Math.min(1, pending / 25);
    const circumference = 176; // 2 * PI * 28, rounded

    document.getElementById('lb-amount').textContent = fmtWTC(pending);
    document.getElementById('lb-amount').style.color = claimable ? 'var(--video-hue)' : 'var(--ink-muted)';
    document.getElementById('lb-progress-ring').style.strokeDashoffset = circumference - (circumference * pct);
    el.classList.toggle('claimable', claimable);

    // ── "please claim!" hint — stays visible next to the lootbox for as long
    // as it's claimable, since the backend now refuses to credit any more
    // video WTC until the user actually claims it.
    let hint = document.getElementById('lb-claim-hint');
    if (claimable) {
        if (!hint) {
            hint = document.createElement('div');
            hint.id = 'lb-claim-hint';
            hint.className = 'lb-claim-hint';
            hint.innerHTML = `<div class="lb-claim-hint-bubble">Claim me!</div><div class="lb-claim-hint-arrow">➜</div>`;
            document.body.appendChild(hint);
        }
        const rect = el.getBoundingClientRect();
        hint.style.top = `${rect.top + rect.height / 2 - 12}px`;
        hint.style.left = `${rect.left - 108}px`;
    } else if (hint) {
        hint.remove();
    }
}
function removeFloatingLootbox() { document.getElementById('floating-lootbox')?.remove(); document.getElementById('lb-claim-hint')?.remove(); }

function showLootboxGain(amount) {
    const lb = document.getElementById('floating-lootbox');
    if (!lb) return;
    const rect = lb.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'lb-gain-float';
    el.textContent = `+${amount}`;
    el.style.left = `${rect.left + rect.width / 2 - 14}px`;
    el.style.top = `${rect.top}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

async function tryClaimLootbox() {
    const pending = state.user?.pendingVideoWTC || 0;
    if (pending < 25) { toast(`You need at least 25 WTC to claim (currently ${fmtWTC(pending)}).`, 'info'); return; }

    // Show one random real ad (Adsgram or Monetag) before granting the reward —
    // the reward only fires after the ad SDK's promise actually resolves.
    const candidates = [showAdsgramDailyAd, showAdsgramSpecialAd, showMonetagAd];
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    toast('Loading ad...', 'info');
    try {
        await pick();

let sessionEarnedTotal = 0;
let sessionDisplayWTC = 0; // visual only — increments every 10s for mining feel
let videoWatchSeconds = 0;
let lastMonetagInterstitialAt = 0;

function updateLootboxFullUI(isFull) {
    const banner = document.getElementById('vp-lootbox-full-banner');
    const sub = document.getElementById('vp-session-sub');
    if (!banner || !sub) return;
    banner.style.display = isFull ? 'block' : 'none';
    sub.textContent = isFull ? 'Paused — claim your lootbox to resume earning' : '40 WTC earned per hour watched';
}

async function startVideoSession() {
    sessionEarnedTotal = 0;
    sessionDisplayWTC = 0;
    videoWatchSeconds = 0;
    lastMonetagInterstitialAt = 0;
    const startRes = await apiPost('earn', { action: 'videoStart', userId: USER_ID });
    if (!startRes.success) { toast(errorText(startRes.error), 'error'); return; }
    state.videoSession = { startTime: startRes.startTime, signature: startRes.signature };
    updateLootboxFullUI((state.user?.pendingVideoWTC || 0) >= 25);

    // ── Visual counter: every 10 seconds, adds 0.111 WTC (= 40 WTC/hr / 360 ticks/hr)
    // This is purely for display — it makes the UI feel like a miner ticking up.
    // The real WTC is only credited by the 30-second backend call below.
    // ⚠️ FIX: this used to keep climbing even after the backend stopped crediting
    // (once pendingVideoWTC hits the 25 WTC claim threshold), so the video page
    // could show e.g. "60 WTC" for a full hour watched while the real claimable
    // amount silently capped out much lower — a confusing "where did my WTC go"
    // moment when the user went back to actually claim. Now the ticker freezes
    // (and shows the same lootbox-full banner) the instant the real cap is hit,
    // so the number on screen is always the number they'll actually get.
    state.videoDisplayInterval = setInterval(() => {
        if (!state.videoSession) return;
        if ((state.user?.pendingVideoWTC || 0) >= 25) { updateLootboxFullUI(true); return; }
        sessionDisplayWTC = parseFloat((sessionDisplayWTC + 0.111).toFixed(3));
        const out = document.getElementById('vp-session-wtc');
        if (out) out.textContent = `${sessionDisplayWTC.toFixed(1)} WTC`;
    }, 10000);

    // ── Backend API: every 30 seconds, actually credits WTC to pendingVideoWTC ──
    state.videoSessionInterval = setInterval(async () => {
        if (!state.videoSession) return;
        videoWatchSeconds += 30;

        // Passive Monetag interstitial every 10 minutes — no reward, just passive monetization
        if (videoWatchSeconds - lastMonetagInterstitialAt >= MONETAG_INTERVAL_SECONDS) {
            lastMonetagInterstitialAt = videoWatchSeconds;
            try { showMonetagAd(); } catch (e) { /* non-blocking */ }
        }

        const elapsedSec = Math.floor((Date.now() - state.videoSession.startTime) / 1000);
        const claimable = Math.floor(elapsedSec * (1 / 60));
        if (claimable <= 0) return;

        // ⚠️ NEW: once 25+ WTC is already sitting unclaimed in the lootbox, the
        // backend won't credit more anyway — skip the call, keep the video
        // session alive (so it resumes right after they claim), and nudge them
        // once (not every 30s, to avoid spamming toasts).
        if ((state.user?.pendingVideoWTC || 0) >= 25) {
            updateLootboxFullUI(true);
            if (!state._lootboxNudgeShown) {
                state._lootboxNudgeShown = true;
                toast('🎁 Your lootbox is full — claim it to keep earning!', 'info');
            }
            return;
        }
        updateLootboxFullUI(false);

        const r = await apiPost('earn', { action: 'videoClaim', startTime: state.videoSession.startTime, signature: state.videoSession.signature, claimedPoints: claimable });
        if (r.ok) {
            sessionEarnedTotal += claimable;
            // Sync display to actual earned value after each real credit
            sessionDisplayWTC = Math.max(sessionDisplayWTC, sessionEarnedTotal);
            const out = document.getElementById('vp-session-wtc');
            if (out) out.textContent = `${sessionDisplayWTC.toFixed(1)} WTC`;
            if (state.user) state.user.pendingVideoWTC = r.pendingVideoWTC;
            renderFloatingLootbox();
            showLootboxGain(claimable);
            const fresh = await apiPost('earn', { action: 'videoStart', userId: USER_ID });
            if (fresh.success) state.videoSession = { startTime: fresh.startTime, signature: fresh.signature };
        } else if (r.error === 'lootbox_claim_required') {
            updateLootboxFullUI(true);
            if (!state._lootboxNudgeShown) {
                state._lootboxNudgeShown = true;
                toast('🎁 Your lootbox is full — claim it to keep earning!', 'info');
            }
        }
    }, 30000);
}

function closeVideoPlayer() {
    if (state.videoSessionInterval) clearInterval(state.videoSessionInterval);
    if (state.videoDisplayInterval) clearInterval(state.videoDisplayInterval);
    state.videoSession = null;
    document.getElementById('modal-root').innerHTML = '';
    renderVideoTab();
}

    (async () => {

async function watchAdNetwork(network) {
    const showFn = AD_SHOW_FUNCTIONS[network];
    const networkLabel = AD_NETWORKS_UI.find(n => n.id === network)?.label || network;
    toast(`Loading ${networkLabel} ad...`, 'info');
    try {
        await showFn();
        await creditAdReward(network);
    } catch (e) {
        // A network-specific, explicit message — a different network's ad is
        // never played instead; on failure the user is told directly to try
        // again or pick a different option.
        toast(`${networkLabel} ad isn't available right now. Please try again or pick a different network.`, 'error');
    }
}

async function creditAdReward(network) {
    const r = await apiPost('earn', { action: 'claimAdReward', network });
    if (r.ok) {
        toast(`+${r.reward} WTC added! (${r.countToday}/${r.dailyLimit})`, 'success');
        triggerBurst(document.querySelector(`button[data-network="${network}"]`));
        showCongrats(`+${r.reward} WTC`, '📺');
        await refreshUser();
        renderEarningTab();
    } else { toast(errorText(r.error), 'error'); }
}

        <div class="section-pad" style="margin-top:18px;">

function taskCardHtml(t) {
    const verified = t.category === 'channel';
    const isFaucet = t.category === 'faucet';
    const isArticle = t.category === 'article';
    const icon = verified ? '📢' : isFaucet ? '🚰' : isArticle ? '📰' : '🌐';
    const badgeText = verified ? '✓ Verified' : isFaucet ? 'Faucet' : isArticle ? 'Article' : 'Link';

    const hue = isFaucet ? 'var(--faucet-hue)' : isArticle ? 'var(--article-hue)' : verified ? 'var(--signal)' : 'var(--task-hue)';
    const hueSoft = isFaucet ? 'var(--faucet-soft)' : isArticle ? 'var(--article-soft)' : verified ? 'var(--signal-soft)' : 'var(--task-soft)';
    return `
    <div class="card task-card-big" data-task-card="${t._id}">
        <div class="tc-icon" style="background:${hueSoft}; border-color:${hueSoft};">${icon}</div>
        <div style="flex:1; min-width:0;">

            <div class="tc-title">${t.title}</div>
            <button class="btn tc-go-btn" style="background:${hue}; box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 6px 14px ${hueSoft};" data-task="${t._id}" data-url="${t.url || ''}" data-category="${t.category || 'partner'}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Start
            </button>
        </div>
        <div class="tc-reward-badge">
            <div class="tc-reward-amount" style="color:${hue};">+${t.rewardWtc || 0}</div>
            <div class="tc-reward-label">WTC</div>
        </div>
    </div>`;
}

function goToTask(taskId, url, category) {
    // Open the link first
    if (url) window.open(url, '_blank');

    // Then show the claim/verify sheet — user must actively press Claim
    const task = state.tasks.find(t => t._id === taskId);
    const isVerified = category === 'channel';

    document.getElementById('modal-root').innerHTML = `
        <div class="overlay" onclick="if(event.target===this)this.remove()">
            <div class="sheet anim-in">
                <div class="sheet-handle"></div>
                <div style="font-weight:600; font-size:16px; margin-bottom:6px;">${task?.title || 'Task'}</div>
                <div class="muted" style="font-size:13px; margin-bottom:18px;">
                    ${isVerified
                        ? 'After joining the channel/group, tap Verify below. Our server will check your membership.'
                        : 'After completing the task above, tap Claim to receive your reward.'}
                </div>
                ${isVerified ? `
                    <button class="btn btn-signal" id="task-verify-btn" style="margin-bottom:10px;">
                        ✅ Verify Membership
                    </button>` : `
                    <button class="btn btn-primary" id="task-claim-btn" style="margin-bottom:10px;" disabled>
                        🎁 Claim in <span id="task-claim-countdown">10</span>s
                    </button>`}
                <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">
                    Cancel
                </button>
            </div>
        </div>`;

    const actionBtn = document.getElementById('task-verify-btn') || document.getElementById('task-claim-btn');
    if (actionBtn) {
        actionBtn.onclick = async () => {
            actionBtn.disabled = true;
            actionBtn.textContent = 'Checking...';
            await completeTask(taskId);
        };
    }

    // ⚠️ Soft anti-abuse friction (matches the read→wait→claim pattern from
    // reference apps) — link-based tasks can't be server-verified (we can't
    // confirm someone actually visited an external site), so this at least
    // stops instant claim-without-clicking. It's not real verification, just
    // a reasonable minimum.
    const claimBtn = document.getElementById('task-claim-btn');
    if (claimBtn) {
        let remaining = 10;
        const countdownEl = document.getElementById('task-claim-countdown');
        const timer = setInterval(() => {
            remaining--;
            if (!document.getElementById('task-claim-countdown')) { clearInterval(timer); return; }
            if (remaining <= 0) {
                clearInterval(timer);
                claimBtn.disabled = false;
                claimBtn.innerHTML = '🎁 Claim Reward';
            } else {
                countdownEl.textContent = remaining;
            }
        }, 1000);
    }
}

async function completeTask(taskId) {
    const r = await apiPost('earn', { action: 'taskComplete', taskId });
    document.getElementById('modal-root').innerHTML = ''; // close sheet
    if (r.ok) {
        toast(`+${r.rewardWtc} WTC added!`, 'success');
        triggerBurst(document.querySelector(`button[data-task="${taskId}"]`) || document.body);
        showCongrats(`+${r.rewardWtc} WTC`, '✅');
        await refreshUser();

        // 🎁 Second revenue stream for article tasks: fire a passive ad after
        // claiming (result ignored — this isn't tied to the user's reward,
        // it's just an extra impression for us). Same pattern as the video
        // section's periodic passive interstitial.
        const claimedTask = (state.tasks || []).find(t => t._id === taskId);
        if (claimedTask?.category === 'article') {
            showMonetagAd().catch(() => {});
        }

        // ── Vanishes the completed task's card with an animation, then refreshes the list ──
        const refreshActiveTab = () => {
            if (state.activeTab === 'earning') renderEarningTab();
            else if (state.activeTab === 'task') renderTaskTab();
        };
        const card = document.querySelector(`[data-task-card="${taskId}"]`);
        if (card) {
            card.classList.add('task-vanish');
            setTimeout(refreshActiveTab, 480);
        } else {
            refreshActiveTab();
        }
    }
    else if (r.alreadyDone) { toast('You already completed this task.', 'info'); }
    else if (r.error === 'not_member') { toast('Not a member yet — join first, then verify.', 'error'); }
    else { toast(errorText(r.error), 'error'); }
}

async function refreshUser() {
    const r = await apiGet(`user?action=profile&initData=${encodeURIComponent(TG_INIT_DATA)}`);
    if (r.ok) {
        state.user = r.user;
        // Ban gate — if user is banned, show ban screen and stop everything
        if (r.user?.isBanned) {
            document.getElementById('app-root').innerHTML = '';
            const appealUrl = `https://t.me/NewTube12_bot?start=appeal_${USER_ID}`;
            document.getElementById('modal-root').innerHTML = `
                <div style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;z-index:999;">
                    <div style="font-size:52px;margin-bottom:20px;">⛔</div>
                    <div style="font-family:var(--font-display);font-weight:700;font-size:22px;margin-bottom:12px;">Account Banned</div>
                    <div style="color:var(--ink-muted);font-size:14px;line-height:1.7;margin-bottom:24px;">Your account has been banned for using multiple accounts on the same device.<br><br>If you believe this is a mistake, tap below to request a review from the admin.</div>
                    <a href="${appealUrl}" target="_blank" class="btn btn-primary" style="width:auto; padding:0 22px; text-decoration:none;">🆘 Request Review</a>
                </div>`;
            throw new Error('banned'); // stop further execution in init()
        }
    }
}

async function init() {
    const splashStart = performance.now();

    // ── Telegram-only gate ── matches the original app's behavior: wait briefly
    // for Telegram's WebApp bridge to deliver initData, and if it never does
    // (because this was opened in a regular browser, not via Telegram), block
    // entirely instead of silently falling back to a fake/demo identity.
    if (!hydrateDisplayUserFields()) {
        await new Promise(r => setTimeout(r, 800));
        if (!hydrateDisplayUserFields()) {
            await new Promise(r => setTimeout(r, 1500));
        }
    }
    if (!TG_INIT_DATA || !hydrateDisplayUserFields()) {
        document.getElementById('splash').remove();
        document.getElementById('app-root').innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; text-align:center; padding:0 30px;">
                <div style="font-size:48px;">📱</div>
                <div style="font-family:var(--font-display); font-weight:700; font-size:17px;">Open this in Telegram</div>
                <div class="muted" style="font-size:13px; line-height:1.6;">NEWTUBE only works inside the Telegram app. Please open it via the NEWTUBE bot.</div>
            </div>`;
        return;
    }

    await apiPost('user', { action: 'init', fingerprint: await generateDeviceFingerprint() });
    try {
        await refreshUser();
    } catch (e) {
        if (e.message === 'banned') {
            // Ban screen already shown in refreshUser() — remove splash and stop
            const splash = document.getElementById('splash');
            if (splash) { splash.classList.add('out'); setTimeout(() => splash.remove(), 550); }
            return;
        }
        throw e;
    }

    // Splash stays for at least 900ms so its entrance animation is always seen,
    // even when the network is fast — avoids an abrupt flash-then-gone feel.
    const elapsed = performance.now() - splashStart;
    if (elapsed < 900) await new Promise(r => setTimeout(r, 900 - elapsed));
    const splash = document.getElementById('splash');
    splash.classList.add('out');
    setTimeout(() => splash.remove(), 550);

    showOnboarding(async () => {
        const joinCheck = await apiGet(`user?action=checkJoin&initData=${encodeURIComponent(TG_INIT_DATA)}`);
        if (joinCheck.joined) startApp();
        else showJoinGate({ leftAfterVerifying: joinCheck.leftAfterVerifying }, startApp);
    });
}

function startApp() {
    renderShell();
    switchTab('home');
    startJoinWatcher();
    setTimeout(checkPendingGift, 900); // after the splash/home entrance animation, so the two don't show at once
}

async function generateDeviceFingerprint() {
    try {
        const parts = [];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 50;
        ctx.textBaseline = 'top'; ctx.font = '14px Arial'; ctx.fillStyle = '#f60'; ctx.fillRect(0, 0, 100, 20);
        ctx.fillStyle = '#069'; ctx.fillText('NEWTUBE-fp', 2, 15);
        parts.push(canvas.toDataURL());
        parts.push(screen.width + 'x' + screen.height + 'x' + screen.colorDepth);
        parts.push(navigator.language || '');
        parts.push(Intl.DateTimeFormat().resolvedOptions().timeZone || '');
        parts.push(navigator.hardwareConcurrency || '');
        const data = new TextEncoder().encode(parts.join('|||'));
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    } catch { return null; }
}

init();
