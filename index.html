<!DOCTYPE html>
<html lang="en">
<head>

<title>NEWTUBE — Watch & Earn</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ══════════════════════════════════════════════════════════
     AD NETWORK SDKs — real integration, matching the original app's
     working zone/block IDs (extracted from your previous main.html)
     ══════════════════════════════════════════════════════════ -->
<script type="text/javascript" src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<!-- ⚠️ Monetag (libtl.com) is loaded statically again (back to how it
     originally was). It was switched to lazy-load earlier to stop its
     global click-listener from firing on GigaPub/Adsgram clicks — but in
     practice, forcing a full cold script reload on every single watch
     attempt (load → use → immediately remove) gave Monetag's ad server no
     time to warm up / prefetch inventory, causing frequent genuine "ad not
     available" no-fill errors and far fewer impressions than Adsgram. That
     reliability loss outweighs the click-hijacking risk, so it's back to
     loading once, staying loaded for the whole session. -->
<script src='//libtl.com/sdk.js' data-zone='9442539' data-sdk='show_9442539'></script>
<script src="https://ad.gigapub.tech/script?id=846"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #05060F;
        --bg-nebula-1: rgba(124,58,237,0.16);   /* violet nebula cloud */
        --bg-nebula-2: rgba(20,120,150,0.14);   /* deep teal nebula cloud */
        --surface: #0D0F1F;
        --surface-raised: #141830;
        --surface-pop: #1C2140;
        /* ── "lightning" primary — electric violet → cyan, replaces the old plain blue ── */
        --coin: #8B5CF6;
        --coin-deep: #5B21B6;
        --coin-soft: rgba(139,92,246,0.18);
        --accent: #35E7FF;
        --accent-soft: rgba(53,231,255,0.16);
        --signal: #C9D6FF;
        --signal-soft: rgba(201,214,255,0.14);
        --ink: #F1F0FF;
        --ink-muted: #9C9AC2;
        --ink-faint: #5C5A85;
        --border: rgba(241,240,255,0.07);
        --border-strong: rgba(241,240,255,0.15);
        --danger: #FF5C7A;
        --danger-soft: rgba(255,92,122,0.14);
        --success: #22C55E;
        /* ── functional colors — different features get their own matching color
           instead of everything being one blue tint ── */
        --money: #22C55E;        /* withdraw / cash-out related */
        --money-soft: rgba(34,197,94,0.16);
        --video-hue: #F0459B;    /* video / lootbox section */
        --video-soft: rgba(240,69,155,0.16);
        --task-hue: #F5A623;     /* regular tasks */
        --task-soft: rgba(245,166,35,0.16);
        --faucet-hue: #14B8A6;   /* faucet sites */
        --faucet-soft: rgba(20,184,166,0.16);
        --article-hue: #38BDF8; /* articles */
        --article-soft: rgba(56,189,248,0.16);
        --gift-hue: #FFB020;     /* admin gifts */
        --gift-soft: rgba(255,176,32,0.16);
        --refer-hue: #EC4899;    /* referrals */
        --refer-soft: rgba(236,72,153,0.16);
        /* ── NEW — each ad network gets its own unique color, not one shared blue ── */
        --net-adsgram-daily: #3DA9FF;
        --net-adsgram-daily-soft: rgba(61,169,255,0.16);
        --net-adsgram-special: #B463FF;
        --net-adsgram-special-soft: rgba(180,99,255,0.18);
        --net-monetag: #22E6B3;
        --net-monetag-soft: rgba(34,230,179,0.16);
        --net-giga: #FFD23D;
        --net-giga-soft: rgba(255,210,61,0.18);
        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); }
    body {
        color: var(--ink);
        font-family: var(--font-body);
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 96px;
        overflow-x: hidden;
        position: relative;
    }
    /* ── NEW — galaxy/nebula backdrop: two slow-drifting color clouds + a
       fixed star-dust layer (pure CSS radial-gradients, no images). Sits
       behind everything (z-index:-2/-1), fixed so it doesn't scroll with
       content, and is intentionally subtle — this is atmosphere, not a
       focal point. ── */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
            radial-gradient(ellipse 60% 40% at 15% 8%, var(--bg-nebula-1), transparent 60%),
            radial-gradient(ellipse 55% 45% at 90% 78%, var(--bg-nebula-2), transparent 65%),
            var(--bg);
        animation: nebula-drift 26s ease-in-out infinite alternate;
    }
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.5;
        background-image:
            radial-gradient(1.4px 1.4px at 20% 30%, rgba(241,240,255,0.55), transparent),
            radial-gradient(1.2px 1.2px at 75% 15%, rgba(241,240,255,0.4), transparent),
            radial-gradient(1px 1px at 50% 65%, rgba(241,240,255,0.5), transparent),
            radial-gradient(1.3px 1.3px at 85% 85%, rgba(201,214,255,0.45), transparent),
            radial-gradient(1px 1px at 10% 80%, rgba(241,240,255,0.35), transparent),
            radial-gradient(1.5px 1.5px at 35% 92%, rgba(201,214,255,0.4), transparent),
            radial-gradient(1px 1px at 65% 40%, rgba(241,240,255,0.3), transparent);
        background-size: 100% 100%;
    }
    @keyframes nebula-drift { 0% { filter: hue-rotate(0deg) brightness(1); } 100% { filter: hue-rotate(14deg) brightness(1.06); } }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    .hidden { display: none !important; }
    img { max-width: 100%; display: block; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 8px; position: relative; overflow: hidden; }
    .topbar::before, .topbar::after { content: ''; position: absolute; border-radius: 50%; pointer-events: none; z-index: -1; }
    .topbar::before { width: 130px; height: 130px; background: radial-gradient(circle, var(--coin-soft), transparent 70%); top: -70px; left: -30px; }
    .topbar::after { width: 90px; height: 90px; background: radial-gradient(circle, var(--accent-soft), transparent 70%); top: -40px; right: 10%; }
    .topbar-ring { position: absolute; width: 46px; height: 46px; border-radius: 50%; border: 1.5px solid var(--border-strong); top: 10px; right: 78px; pointer-events: none; z-index: -1; opacity: 0.6; }
    .topbar-ring::before { content: ''; position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--signal); top: -3px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 6px var(--signal); }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -2px 4px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: #FFFFFF; }
    .brand-name { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: 0.2px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: none; display: flex; align-items: center; justify-content: center; color: var(--ink); position: relative; }
    .icon-btn.has-dot::after { content: ''; position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }

    .card { background: linear-gradient(160deg, var(--surface-raised), var(--surface)); border-radius: 16px; padding: 16px 18px; border: 0.5px solid var(--border); box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 28px rgba(0,0,0,0.38), 0 1px 0 rgba(139,92,246,0.06); }
    .btn { height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; font-size: 14px; border: none; width: 100%; transition: transform 0.12s ease, box-shadow 0.12s ease; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--coin) 55%, var(--coin-deep)); color: #FFFFFF; box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -3px 6px rgba(0,0,0,0.25), 0 10px 22px var(--coin-soft); }
    .btn-primary:active { transform: translateY(2px) scale(0.99); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), inset 0 -1px 3px rgba(0,0,0,0.25), 0 4px 10px var(--coin-soft); }
    .btn-outline { background: transparent; border: 0.5px solid var(--border-strong); color: var(--ink); }

    /* ══════════════════════════════════════════════════════════
       HOME REDESIGN — replaces the old "stack of identical rounded
       cards" layout. Signature element: the hero balance card has a
       real edge (gradient border, not just a blurred glow) and an
       etched lightning-bolt watermark instead of a generic spinning
       ring. Actions get a hierarchy (one wide primary + two icon-only
       secondaries) instead of 3 equal-width pill buttons. Stats are
       ONE divided strip instead of two stacked 2-card grids. ══════════════════════════════════════════════════════════ */
    .hero-balance {
        position: relative; overflow: hidden; border-radius: 20px; padding: 20px 20px 18px;
        background:
            radial-gradient(ellipse 140% 100% at 100% -20%, var(--coin-soft), transparent 60%),
            linear-gradient(165deg, var(--surface-raised), var(--surface));
        border: 1px solid transparent;
        background-clip: padding-box;
        box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 16px 34px rgba(0,0,0,0.42);
    }
    .hero-balance::before {
        content: ''; position: absolute; inset: 0; border-radius: 20px; padding: 1px;
        background: linear-gradient(150deg, var(--accent-soft), transparent 40%, transparent 70%, var(--coin-soft));
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude;
        pointer-events: none;
    }
    .hero-bolt { position: absolute; right: 6px; top: 2px; width: 92px; height: 128px; opacity: 0.1; pointer-events: none; }
    .hero-top-row { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
    .hero-id-chip { font-size: 10.5px; color: var(--ink-faint); background: rgba(0,0,0,0.18); border: 0.5px solid var(--border); padding: 3px 8px; border-radius: 999px; }
    .hero-amount-row { display: flex; align-items: flex-end; gap: 9px; margin-top: 10px; position: relative; z-index: 1; }
    .hero-usd-line { margin-top: 5px; font-size: 12.5px; color: var(--ink-muted); position: relative; z-index: 1; display: flex; align-items: center; gap: 5px; }
    .hero-divider { margin: 14px 0 12px; height: 1px; background: linear-gradient(90deg, transparent, var(--border-strong), transparent); position: relative; z-index: 1; }
    .hero-withdrawable-row { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; margin-bottom: 14px; }
    .hero-actions { display: flex; gap: 8px; position: relative; z-index: 1; }
    .action-primary { flex: 1; height: 44px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; gap: 7px; font-weight: 600; font-size: 13.5px; color: #04140A; background: linear-gradient(135deg, var(--money), #16A34A); box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 8px 18px var(--money-soft); }
    .action-icon-btn { width: 44px; height: 44px; border-radius: 12px; border: 0.5px solid var(--border-strong); background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; color: var(--ink-muted); flex-shrink: 0; }
    .action-icon-btn:active, .action-primary:active { transform: scale(0.95); }

    /* live activity ticker — a slim inline line, not a boxed card */
    .live-ticker { display: flex; align-items: center; gap: 8px; margin: 12px 4px 0; overflow: hidden; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--money); flex-shrink: 0; box-shadow: 0 0 6px var(--money); animation: live-dot-pulse 1.8s ease-in-out infinite; }
    @keyframes live-dot-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* unified stat strip — one card, divided columns, instead of 4 separate cards */
    .stat-strip { display: flex; border-radius: 16px; overflow: hidden; border: 0.5px solid var(--border); background: linear-gradient(165deg, var(--surface-raised), var(--surface)); }
    .stat-strip-item { flex: 1; padding: 13px 6px; text-align: center; border-right: 0.5px solid var(--border); }
    .stat-strip-item:last-child { border-right: none; }
    .stat-strip-num { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-top: 3px; }
    .stat-strip-label { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.01em; }

    /* leaderboard podium — top 3 get visual weight instead of being plain list rows */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; padding: 18px 8px 6px; }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; max-width: 100px; }
    .podium-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; border: 2px solid var(--border-strong); }
    .podium-slot.rank-1 .podium-avatar { width: 58px; height: 58px; font-size: 20px; border-color: #FFD23D; box-shadow: 0 0 0 3px rgba(255,210,61,0.14), 0 8px 18px rgba(255,210,61,0.25); }
    .podium-slot.rank-2 .podium-avatar { border-color: #C9D6FF; }
    .podium-slot.rank-3 .podium-avatar { border-color: #CD8A5A; }
    .podium-medal { font-size: 15px; margin-top: -3px; }
    .podium-name { font-size: 12px; font-weight: 600; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .podium-refs { font-size: 10.5px; color: var(--ink-faint); }
    .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; }
    .lb-rank-num { width: 22px; text-align: center; font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--ink-faint); flex-shrink: 0; }
    .btn-outline:active { transform: translateY(1px); background: rgba(255,255,255,0.03); }
    .btn-signal { background: var(--signal); color: #04070D; }
    .btn:disabled { opacity: 0.45; }
    .section-pad { padding: 0 20px; }
    .section-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, var(--coin), var(--accent)); flex-shrink: 0; box-shadow: 0 0 6px var(--coin-soft); }
    .muted { color: var(--ink-muted); }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .pill-signal { background: var(--signal-soft); color: var(--signal); }
    .pill-coin { background: var(--coin-soft); color: var(--coin); }

    .bottomnav { position: fixed; bottom: 14px; left: 0; right: 0; max-width: 440px; margin: 0 auto; background: var(--surface-raised); border-radius: 22px; display: flex; align-items: center; justify-content: space-around; padding: 10px 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.45); z-index: 40; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ink-faint); width: 56px; background: none; border: none; padding: 4px 0; }
    .nav-item.active { color: var(--coin); }
    .nav-label { font-size: 10px; font-weight: 500; }
    .nav-earn { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--coin) 55%, var(--coin-deep)); display: flex; align-items: center; justify-content: center; margin-top: -28px; box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -4px 8px rgba(0,0,0,0.25), 0 8px 20px var(--coin-soft); color: #FFFFFF; }

    #toast-host { position: fixed; top: 14px; left: 0; right: 0; max-width: 430px; margin: 0 auto; z-index: 200; pointer-events: none; padding: 0 16px; }
    .toast { background: var(--surface-pop); border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: toast-in 0.25s ease; }
    .toast.success { border-color: rgba(93,202,165,0.4); }
    .toast.error { border-color: rgba(255,92,122,0.4); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .overlay { position: fixed; inset: 0; background: rgba(10,9,12,0.78); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: 22px 22px 0 0; padding: 22px 20px 28px; max-height: 86vh; overflow-y: auto; }
    .sheet-fullscreen { width: 100%; max-width: 480px; background: var(--bg); border-radius: 0; padding: 0; max-height: 100vh; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sheet-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 4px; margin: 0 auto 16px; }
    .field-label { font-size: 13px; color: var(--ink-muted); margin: 14px 0 6px; }
    .field-input { width: 100%; height: 46px; border-radius: 12px; background: var(--surface-raised); border: 0.5px solid var(--border); color: var(--ink); padding: 0 14px; font-size: 14px; }

    /* ══════════════════════════════════════════════════════════
       ANIMATION SYSTEM — lightweight CSS keyframes + canvas particles.
       Kept GPU-cheap (transform/opacity only) so it stays smooth on
       mid-range Android devices inside the Telegram WebView.
       ══════════════════════════════════════════════════════════ */

    /* ── splash screen ── */
    #splash { position: fixed; inset: 0; background: radial-gradient(circle at 50% 38%, #0E1830 0%, var(--bg) 68%); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, transform 0.5s ease; }
    #splash.out { opacity: 0; transform: scale(1.06); pointer-events: none; }
    .splash-orbit { position: absolute; width: 208px; height: 208px; border-radius: 50%; border: 1px solid rgba(47,123,255,0.16); animation: splash-orbit-spin 7s linear infinite; z-index: 0; }
    .splash-orbit::before, .splash-orbit::after { content: ''; position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--coin); box-shadow: 0 0 10px rgba(47,123,255,0.9); }
    .splash-orbit::before { top: -3px; left: 50%; margin-left: -3px; }
    .splash-orbit::after { bottom: -3px; left: 50%; margin-left: -3px; background: var(--signal); box-shadow: 0 0 10px rgba(56,189,248,0.9); }
    @keyframes splash-orbit-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .splash-badge { position: relative; width: 88px; height: 88px; border-radius: 26px; display: flex; align-items: center; justify-content: center; background: linear-gradient(155deg, #16233D, #05070D); box-shadow: inset 0 1px 1px rgba(255,255,255,0.08), inset 0 -8px 16px rgba(0,0,0,0.5), 0 20px 44px rgba(0,0,0,0.55); animation: splash-pop 0.7s cubic-bezier(.34,1.56,.64,1); z-index: 1; }
    .splash-badge-inner { width: 100%; height: 100%; border-radius: 26px; display: flex; align-items: center; justify-content: center; background: linear-gradient(155deg, rgba(47,123,255,0.18), rgba(47,123,255,0.02) 65%); color: var(--coin); position: relative; overflow: hidden; }
    .splash-badge-inner .splash-play { filter: drop-shadow(0 0 10px rgba(47,123,255,0.65)); position: relative; z-index: 1; }
    .splash-badge-sheen { position: absolute; inset: -40% -10%; background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.14) 50%, transparent 60%); transform: translateX(-120%); animation: splash-sheen-sweep 2.4s ease-in-out 0.4s infinite; }
    @keyframes splash-sheen-sweep { 0% { transform: translateX(-130%); } 45%,100% { transform: translateX(130%); } }
    .splash-badge::before, .splash-badge::after { content: ''; position: absolute; inset: -7px; border-radius: 32px; border: 1.5px solid var(--coin); opacity: 0; animation: splash-ring 2s ease-out infinite; }
    .splash-badge::after { animation-delay: 0.65s; }
    @keyframes splash-pop { 0% { transform: scale(0) rotate(-25deg); opacity: 0; } 60% { transform: scale(1.15) rotate(4deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes splash-ring { 0% { transform: scale(1); opacity: 0.55; } 100% { transform: scale(1.55); opacity: 0; } }
    .splash-name { margin-top: 20px; font-family: var(--font-display); font-weight: 700; font-size: 21px; letter-spacing: 0.5px; opacity: 0; animation: fade-up 0.6s ease 0.35s forwards; }
    .splash-name .accent { color: var(--coin); text-shadow: 0 0 16px rgba(47,123,255,0.5); }
    .splash-tagline { margin-top: 6px; font-size: 12px; color: var(--ink-muted); opacity: 0; animation: fade-up 0.6s ease 0.5s forwards; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── generic entrance utilities ── */
    .anim-in { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) both; }
    .anim-in-2 { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) 0.06s both; }
    .anim-in-3 { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) 0.12s both; }
    .anim-in-4 { animation: rise-in 0.45s cubic-bezier(.22,.9,.32,1) 0.18s both; }
    @keyframes rise-in { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .tab-fade { animation: tab-fade 0.32s ease both; }
    @keyframes tab-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── balance card shimmer + breathing coin ring ── */
    .coin-ring-spin { animation: ring-breathe 4s ease-in-out infinite; }
    @keyframes ring-breathe { 0%,100% { transform: scale(1) rotate(0deg); opacity: 0.16; } 50% { transform: scale(1.03) rotate(3deg); opacity: 0.24; } }
    .shimmer-sweep { position: absolute; inset: 0; background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.07) 50%, transparent 70%); transform: translateX(-100%); animation: sweep 2.6s ease-in-out infinite; pointer-events: none; }
    @keyframes sweep { 0% { transform: translateX(-120%); } 60%,100% { transform: translateX(120%); } }
    .count-pop { display: inline-block; animation: count-pop 0.35s ease; }
    @keyframes count-pop { 0% { transform: scale(1.18); color: var(--coin); } 100% { transform: scale(1); } }

    /* ── floating lootbox ── */
    #floating-lootbox { transition: transform 0.2s ease; animation: lootbox-bob 2.4s ease-in-out infinite; }
    #floating-lootbox:active { transform: scale(0.9); }
    @keyframes lootbox-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    #floating-lootbox.claimable { animation: lootbox-bob 2.4s ease-in-out infinite, lootbox-pulse 1.6s ease-in-out infinite; }
    @keyframes lootbox-pulse { 0%,100% { box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(139,92,246,0.45); } 50% { box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 8px rgba(139,92,246,0); } }
    #lb-coin-icon { transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); }
    #floating-lootbox.claimable #lb-coin-icon { animation: coin-flip 1.8s ease-in-out infinite; }
    .lb-claim-hint { position: fixed; z-index: 51; display: flex; align-items: center; gap: 6px; pointer-events: none; animation: lb-hint-bob 1.4s ease-in-out infinite; }
    .lb-claim-hint-bubble { background: linear-gradient(160deg, var(--signal), var(--coin) 70%); color: #06120A; font-weight: 700; font-size: 11.5px; padding: 5px 10px; border-radius: 999px; white-space: nowrap; box-shadow: 0 6px 14px rgba(0,0,0,0.35); }
    .lb-claim-hint-arrow { font-size: 20px; transform: rotate(90deg); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35)); }
    @keyframes lb-hint-bob { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-4px); } }
    @keyframes coin-flip { 0%,100% { transform: scale(1) rotate(0); } 50% { transform: scale(1.08) rotate(5deg); } }
    .lb-gain-float { position: fixed; font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--coin); z-index: 51; pointer-events: none; animation: gain-float 1.1s ease-out forwards; }
    @keyframes gain-float { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 20% { opacity: 1; transform: translateY(-8px) scale(1); } 100% { opacity: 0; transform: translateY(-38px) scale(1); } }

    /* ── buttons: tactile press feedback ── */
    .btn, .nav-item, .icon-btn, .video-thumb { transition: transform 0.12s ease, opacity 0.12s ease; }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .nav-item:active, .icon-btn:active { transform: scale(0.88); }
    .video-thumb:active { transform: scale(0.97); }
    .nav-earn { transition: transform 0.25s cubic-bezier(.34,1.56,.64,1); }
    .nav-item.active .nav-earn { transform: scale(1.08); }

    /* ── onboarding step transition ── */
    .ob-slide-in { animation: ob-slide-in 0.4s cubic-bezier(.22,.9,.32,1) both; }
    @keyframes ob-slide-in { from { opacity: 0; transform: translateX(26px); } to { opacity: 1; transform: translateX(0); } }
    .ob-icon-wrap { width: 90px; height: 90px; border-radius: 50%; background: var(--coin-soft); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; position: relative; }
    .ob-icon-wrap::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid var(--coin); opacity: 0.5; animation: ob-ring 2.2s ease-out infinite; }
    @keyframes ob-ring { 0% { transform: scale(0.85); opacity: 0.6; } 100% { transform: scale(1.25); opacity: 0; } }
    .ob-icon { font-size: 40px; animation: ob-icon-bounce 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both; }
    @keyframes ob-icon-bounce { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }

    /* ── join-gate (entry / "join channel & community" screen) ── */
    .jg-glow { position: absolute; inset: 0; overflow: hidden; border-radius: inherit; pointer-events: none; z-index: 0; }
    .jg-glow::before, .jg-glow::after { content: ''; position: absolute; width: 220px; height: 220px; border-radius: 50%; filter: blur(48px); opacity: 0.35; animation: jg-glow-drift 6s ease-in-out infinite; }
    .jg-glow::before { background: var(--coin); top: -80px; left: -60px; }
    .jg-glow::after { background: var(--accent); bottom: -90px; right: -60px; animation-delay: 1.4s; }
    @keyframes jg-glow-drift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(14px,-10px) scale(1.12); } }
    .jg-icon-wrap { width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; background: linear-gradient(150deg, var(--coin-soft), var(--accent-soft)); z-index: 1; }
    .jg-icon-wrap::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; background: conic-gradient(from 0deg, var(--coin), var(--accent), var(--signal), var(--coin)); opacity: 0.55; animation: jg-ring-spin 3.5s linear infinite; z-index: -1; }
    .jg-icon-wrap::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--surface); z-index: -1; }
    @keyframes jg-ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .jg-icon { font-size: 42px; position: relative; z-index: 1; animation: ob-icon-bounce 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both; }
    .jg-row { display: flex; gap: 10px; margin-bottom: 12px; opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) forwards; }
    .jg-row:nth-of-type(1) { animation-delay: 0.05s; }
    .jg-row:nth-of-type(2) { animation-delay: 0.15s; }
    @keyframes jg-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .jg-link-card { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 10px; border-radius: 16px; border: 1px solid var(--border-strong); background: linear-gradient(160deg, var(--surface-raised), var(--surface)); text-decoration: none; color: var(--ink); transition: transform 0.12s ease, border-color 0.15s ease; }
    .jg-link-card:active { transform: translateY(2px) scale(0.98); }
    .jg-link-card.jg-channel { border-color: rgba(47,123,255,0.35); }
    .jg-link-card.jg-community { border-color: rgba(56,189,248,0.35); }
    .jg-link-icon { font-size: 22px; }
    .jg-link-label { font-size: 12px; font-weight: 600; }
    .jg-check-btn { opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) 0.28s forwards; background: linear-gradient(135deg, var(--accent), var(--coin) 60%, var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -3px 6px rgba(0,0,0,0.25), 0 10px 24px var(--accent-soft); }

    /* ── gift-box (admin surprise gift) ── */
    .gb-glow { position: absolute; inset: 0; overflow: hidden; border-radius: inherit; pointer-events: none; z-index: 0; }
    .gb-glow::before, .gb-glow::after { content: ''; position: absolute; width: 240px; height: 240px; border-radius: 50%; filter: blur(52px); opacity: 0.4; animation: jg-glow-drift 5s ease-in-out infinite; }
    .gb-glow::before { background: var(--gift-hue); top: -90px; left: -70px; }
    .gb-glow::after { background: var(--accent); bottom: -100px; right: -70px; animation-delay: 1.2s; }
    .gb-rays { position: absolute; inset: 0; z-index: 0; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
    .gb-rays::before { content: ''; position: absolute; width: 260px; height: 260px; background: conic-gradient(from 0deg, transparent 0deg, var(--gift-hue) 4deg, transparent 10deg, transparent 40deg, var(--accent) 44deg, transparent 50deg, transparent 80deg, var(--gift-hue) 84deg, transparent 90deg, transparent 130deg, var(--accent) 134deg, transparent 140deg, transparent 190deg, var(--gift-hue) 194deg, transparent 200deg, transparent 260deg, var(--accent) 264deg, transparent 270deg, transparent 320deg, var(--gift-hue) 324deg, transparent 330deg); animation: gb-ray-spin 8s linear infinite; }
    @keyframes gb-ray-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .gb-box-wrap { width: 112px; height: 112px; margin: 6px auto 18px; position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
    .gb-box { font-size: 60px; animation: gb-bounce 1.6s ease-in-out infinite; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.4)); }
    @keyframes gb-bounce { 0%,100% { transform: translateY(0) rotate(-1.5deg); } 50% { transform: translateY(-5px) rotate(1.5deg); } }
    .gb-reason-card { position: relative; z-index: 1; text-align: left; background: linear-gradient(160deg, var(--surface-raised), var(--surface)); border: 1px solid var(--border-strong); border-radius: 14px; padding: 12px 14px; margin-bottom: 18px; opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) 0.15s forwards; }
    .gb-reason-label { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .gb-reason-text { font-size: 13.5px; line-height: 1.5; }
    .gb-claim-btn { opacity: 0; animation: jg-rise 0.5s cubic-bezier(.22,.9,.32,1) 0.28s forwards; background: linear-gradient(160deg, var(--gift-hue), #E08900 60%); box-shadow: inset 0 1px 1px rgba(255,255,255,0.35), inset 0 -3px 6px rgba(0,0,0,0.25), 0 10px 24px var(--gift-soft); }
    .gb-amount-reveal { font-family: var(--font-display); font-weight: 700; font-size: 40px; text-align: center; margin: 6px 0 4px; color: var(--gift-hue); animation: ob-icon-bounce 0.5s cubic-bezier(.34,1.56,.64,1) both; }

    /* ── ad-network cards (Earning tab) ── */
    .an-card { transition: border-color 0.2s ease; }
    .an-icon { width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 19px; background: linear-gradient(155deg, var(--coin-soft), var(--accent-soft)); border: 1px solid var(--border); }
    .an-progress-track { width: 100%; height: 4px; border-radius: 4px; background: var(--surface-pop); margin-top: 7px; overflow: hidden; }
    .an-progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--coin), var(--accent)); transition: width 0.4s ease; }
    .an-watch-btn { width: auto; flex-shrink: 0; padding: 0 15px; height: 36px; font-size: 12.5px; display: flex; align-items: center; gap: 6px; background: linear-gradient(160deg, var(--coin), var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 6px 14px var(--coin-soft); }
    .an-watch-btn.an-watch-done { background: transparent; border: 1px solid var(--border-strong); color: var(--ink-faint); box-shadow: none; }

    /* ── segmented sub-nav (Tasks/Faucet, Ads/Articles — separate pages within a tab) ── */
    .subnav { display: flex; gap: 6px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 13px; padding: 4px; margin-bottom: 16px; }
    .subnav-btn { flex: 1; border: none; background: transparent; color: var(--ink-muted); font-size: 13px; font-weight: 600; padding: 9px 0; border-radius: 10px; transition: background 0.15s ease, color 0.15s ease; }
    .subnav-btn.active { background: linear-gradient(160deg, var(--coin), var(--coin-deep)); color: #fff; box-shadow: 0 4px 12px var(--coin-soft); }

    /* ── withdraw tier selector — SnakeVerse-style 2-col glow box grid ── */
    #wd-tier-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .wd-tier-btn { position: relative; width: 100%; text-align: left; background: linear-gradient(160deg, var(--surface-raised), var(--surface)); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 13px 12px; color: var(--ink); transition: border-color 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease; overflow: hidden; }
    .wd-tier-btn::before { content: ''; position: absolute; top: -30%; right: -30%; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, var(--money-soft), transparent 70%); pointer-events: none; opacity: 0; transition: opacity 0.2s ease; }
    .wd-tier-btn:active:not([disabled]) { transform: scale(0.97); }
    .wd-tier-btn[disabled] { opacity: 0.45; }
    .wd-tier-btn.wd-tier-selected { border-color: var(--money); box-shadow: inset 0 1px 1px rgba(255,255,255,0.06), 0 8px 20px var(--money-soft); }
    .wd-tier-btn.wd-tier-selected::before { opacity: 1; }
    .wd-tier-check { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; border-radius: 50%; background: var(--money); color: #06170D; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; box-shadow: 0 0 10px var(--money-soft); }
    .wd-tier-usd { font-family: var(--font-display); font-weight: 700; font-size: 20px; position: relative; z-index: 1; }
    .wd-tier-wtc { font-size: 10.5px; color: var(--ink-faint); margin-top: 2px; position: relative; z-index: 1; }
    .wd-tier-status { font-size: 10.5px; margin-top: 8px; line-height: 1.4; position: relative; z-index: 1; }

    /* ── big decorative task/faucet/article cards ── */
    .task-card-big { display: flex; align-items: center; gap: 14px; padding: 16px; }
    .tc-icon { width: 52px; height: 52px; flex-shrink: 0; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: linear-gradient(155deg, var(--coin-soft), var(--accent-soft)); border: 1px solid var(--border); }
    .tc-title { font-weight: 600; font-size: 14.5px; line-height: 1.35; margin-bottom: 10px; }
    .tc-go-btn { width: auto; height: 34px; padding: 0 16px; font-size: 12.5px; display: inline-flex; gap: 6px; background: linear-gradient(160deg, var(--coin), var(--coin-deep)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 6px 14px var(--coin-soft); }
    .tc-reward-badge { flex-shrink: 0; text-align: center; padding: 10px 12px; border-radius: 14px; background: linear-gradient(160deg, var(--surface-pop), var(--surface-raised)); border: 1px solid var(--border-strong); }
    .tc-reward-amount { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--coin); line-height: 1; }
    .tc-reward-label { font-size: 9.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }
    .ob-dot { height: 6px; border-radius: 4px; transition: width 0.35s ease, background 0.35s ease; }

    /* ── toast: icon + smoother spring ── */
    .toast { animation: toast-in 0.35s cubic-bezier(.22,.9,.32,1); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-14px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* ── particle burst canvas ── */
    #burst-canvas { position: fixed; inset: 0; z-index: 300; pointer-events: none; }

    /* ── skeleton loading ── */
    .skel { background: linear-gradient(90deg, var(--surface) 25%, var(--surface-raised) 50%, var(--surface) 75%); background-size: 200% 100%; animation: skel-shine 1.4s ease-in-out infinite; border-radius: 10px; }
    @keyframes skel-shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Task complete → vanish animation ── */
    .task-card-big { transition: none; }
    .task-vanish {
        animation: task-vanish 0.46s cubic-bezier(.4,0,.6,1) forwards;
        pointer-events: none;
    }
    @keyframes task-vanish {
        0%   { opacity: 1; transform: scale(1) translateX(0); max-height: 200px; margin-bottom: 10px; }
        40%  { opacity: 0; transform: scale(0.92) translateX(40px); }
        100% { opacity: 0; transform: scale(0.9) translateX(60px); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; border-width: 0; overflow: hidden; }
    }

    /* ══════════════════════════════════════════════════════════
       SPLASH — extra glow + rising sparkle particles (purely
       decorative, layered behind the existing logo/text).
       ══════════════════════════════════════════════════════════ */
    .splash-glow { position: absolute; width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(47,123,255,0.16), transparent 72%); animation: splash-glow-pulse 2.6s ease-in-out infinite; z-index: 0; }
    @keyframes splash-glow-pulse { 0%,100% { opacity: 0.4; transform: scale(0.92); } 50% { opacity: 0.7; transform: scale(1.1); } }
    .splash-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .splash-particles span { position: absolute; bottom: -10px; width: 5px; height: 5px; border-radius: 50%; background: var(--coin); opacity: 0.75; box-shadow: 0 0 8px rgba(47,123,255,0.7); animation: splash-particle-rise 3.4s ease-in infinite; }
    .splash-particles span:nth-child(1) { left: 14%; animation-delay: 0s; }
    .splash-particles span:nth-child(2) { left: 30%; animation-delay: 0.5s; background: var(--signal); box-shadow: 0 0 8px rgba(56,189,248,0.7); }
    .splash-particles span:nth-child(3) { left: 48%; animation-delay: 1.05s; }
    .splash-particles span:nth-child(4) { left: 64%; animation-delay: 1.65s; background: var(--signal); box-shadow: 0 0 8px rgba(56,189,248,0.7); }
    .splash-particles span:nth-child(5) { left: 80%; animation-delay: 0.85s; }
    .splash-particles span:nth-child(6) { left: 22%; animation-delay: 2.15s; background: var(--signal); box-shadow: 0 0 8px rgba(56,189,248,0.7); }
    @keyframes splash-particle-rise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 15% { opacity: 0.85; } 100% { transform: translateY(-340px) scale(1.1); opacity: 0; } }
    .splash-name, .splash-tagline, .splash-badge { position: relative; z-index: 1; }

    /* ── nav-earn: soft breathing halo, extra polish ── */
    .nav-earn { position: relative; }
    .nav-earn::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid var(--coin); opacity: 0; animation: nav-earn-pulse 2.6s ease-out infinite; }
    @keyframes nav-earn-pulse { 0% { transform: scale(0.85); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }

    /* ══════════════════════════════════════════════════════════
       REWARD CELEBRATION — "Congratulations" overlay shown any
       time a reward is credited (promo / lootbox / ad / task).
       Pure visual layer — does not touch any reward logic.
       ══════════════════════════════════════════════════════════ */
    .congrats-overlay { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(6,10,6,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); animation: congrats-bg-in 0.3s ease both; }
    .congrats-overlay.closing { animation: congrats-bg-out 0.3s ease both; }
    @keyframes congrats-bg-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes congrats-bg-out { from { opacity: 1; } to { opacity: 0; } }
    .congrats-card { position: relative; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 34px 38px; border-radius: 24px; background: linear-gradient(160deg, var(--surface-pop), var(--surface-raised)); border: 0.5px solid var(--border-strong); box-shadow: 0 24px 60px rgba(0,0,0,0.55); animation: congrats-card-in 0.5s cubic-bezier(.34,1.56,.64,1) both; text-align: center; max-width: 300px; }
    .congrats-overlay.closing .congrats-card { animation: congrats-card-out 0.28s ease both; }
    @keyframes congrats-card-in { 0% { transform: scale(0.6) translateY(24px); opacity: 0; } 60% { transform: scale(1.06) translateY(0); opacity: 1; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    @keyframes congrats-card-out { to { transform: scale(0.85); opacity: 0; } }
    .congrats-glow { position: absolute; inset: -34%; border-radius: 50%; background: radial-gradient(circle, rgba(47,123,255,0.35), transparent 70%); animation: congrats-glow-pulse 1.8s ease-in-out infinite; z-index: 0; pointer-events: none; }
    @keyframes congrats-glow-pulse { 0%,100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 0.9; transform: scale(1.1); } }
    .congrats-icon { position: relative; z-index: 1; font-size: 50px; line-height: 1; animation: congrats-icon-bounce 0.8s cubic-bezier(.34,1.56,.64,1) 0.05s both, congrats-icon-wiggle 2.1s ease-in-out 0.85s infinite; }
    @keyframes congrats-icon-bounce { 0% { transform: scale(0) rotate(-18deg); } 60% { transform: scale(1.25) rotate(8deg); } 100% { transform: scale(1) rotate(0); } }
    @keyframes congrats-icon-wiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-6deg); } 75% { transform: rotate(6deg); } }
    .congrats-title { position: relative; z-index: 1; font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: 0.3px; margin-top: 6px; opacity: 0; animation: fade-up 0.5s ease 0.22s forwards; }
    .congrats-sub { position: relative; z-index: 1; font-size: 12px; color: var(--ink-muted); margin-top: 3px; opacity: 0; animation: fade-up 0.5s ease 0.32s forwards; }
    .congrats-amount { position: relative; z-index: 1; font-family: var(--font-display); font-weight: 700; font-size: 27px; color: var(--coin); margin-top: 4px; opacity: 0; text-shadow: 0 0 18px rgba(47,123,255,0.55); animation: congrats-amount-in 0.55s cubic-bezier(.34,1.56,.64,1) 0.42s forwards; }
    @keyframes congrats-amount-in { from { opacity: 0; transform: scale(0.6) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

// ══════════════════════════════════════════════════════════════
// GALAXY BACKGROUND — generates two star-density layers using a

// via CSS box-shadow) so it stays cheap on low-end Android.
// Purely decorative — touches nothing else in the app.
// ══════════════════════════════════════════════════════════════
(function initGalaxyBackground() {
    function makeStars(count, minSize, maxSize) {
        const w = 1000, h = 2000;
        let shadows = [];
        for (let i = 0; i < count; i++) {
            const x = Math.round(Math.random() * w);
            const y = Math.round(Math.random() * h);
            const size = (Math.random() * (maxSize - minSize) + minSize).toFixed(1);
            const op = (Math.random() * 0.6 + 0.3).toFixed(2);
            shadows.push(`${x}px ${y}px 0 rgba(255,255,255,${op})`);
        }
        return { shadows: shadows.join(',') };
    }
    const far = document.getElementById('star-layer-far');
    const near = document.getElementById('star-layer-near');
    if (far) {
        const s = makeStars(140, 0.6, 1.2);
        far.style.boxShadow = s.shadows;
        far.style.width = '1px'; far.style.height = '1px';
    }
    if (near) {
        const s = makeStars(70, 1.2, 2.2);
        near.style.boxShadow = s.shadows;
        near.style.width = '2px'; near.style.height = '2px';
    }
    // sprinkle a handful of twinkling stars on top for extra sparkle
    const bg = document.getElementById('galaxy-bg');
    if (bg) {

            dot.style.top = Math.random() * 100 + '%';

})();

// ══════════════════════════════════════════════════════════════
// AD NETWORK SDK WRAPPERS — real calls, each resolves only after

// click. This keeps the SDK warm across the whole session, which fixed a
// wave of "ad not available" no-fill errors that started once we switched to
// lazy-loading. The one thing we still do defensively: since the script tag
// might not have finished its own async init by the exact moment a user
// clicks (rare, but possible right after the page just opened), briefly poll
// for `show_9442539` to exist rather than failing instantly.
function waitForMonetagSDK(timeoutMs = 5000) {
    if (typeof show_9442539 === 'function') return Promise.resolve();
    return new Promise((res, rej) => {
        const startedAt = Date.now();
        const poll = () => {
            if (typeof show_9442539 === 'function') { res(); return; }
            if (Date.now() - startedAt > timeoutMs) { rej(new Error('monetag_sdk_init_timeout')); return; }
            setTimeout(poll, 100);
        };
        poll();
    });
}
const showMonetagAd = () => waitForMonetagSDK().then(() => new Promise((res, rej) => {
    if (typeof show_9442539 !== 'function') { rej(new Error('sdk_not_loaded')); return; }

}));
const showGigaPubAd = () => new Promise((res, rej) => {

    if (typeof window.showGiga !== 'function') { rej(new Error('sdk_not_loaded')); return; }

    window.showGiga("main").then(res).catch(rej);
});

// API helpers — apiPost automatically attaches the signed Telegram

async function apiPost(path, body = {}) {

        });
        return await res.json();
    } catch (e) { return { ok: false, error: 'server_error' }; }
}
async function apiGet(path) {
    try { const res = await fetch(`${API_BASE}/${path}`); return await res.json(); }
    catch (e) { return { ok: false, error: 'server_error' }; }
}
function fmtWTC(n) { return Math.floor(n || 0).toLocaleString('en-US'); }

// ══════════════════════════════════════════════════════════════
// PARTICLE BURST — lightweight canvas confetti for reward moments
// (claim lootbox, ad reward, task complete, withdraw, promo redeem).
// Self-contained, auto-clears after ~1s — never blocks interaction.
// ══════════════════════════════════════════════════════════════
const burstCanvas = document.getElementById('burst-canvas');
const burstCtx = burstCanvas.getContext('2d');
function resizeBurstCanvas() { burstCanvas.width = window.innerWidth; burstCanvas.height = window.innerHeight; }
resizeBurstCanvas();
window.addEventListener('resize', resizeBurstCanvas);

function triggerBurst(originEl) {
    const rect = originEl ? originEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 };
    const ox = rect.left + rect.width / 2;
    const oy = rect.top + rect.height / 2;
    const colors = ['#2F7BFF', '#38BDF8', '#22C55E', '#F0F5FF'];
    const particles = Array.from({ length: 26 }, () => {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2.5 + Math.random() * 4.5;
        return { x: ox, y: oy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2, size: 3 + Math.random() * 4, color: colors[Math.floor(Math.random() * colors.length)], life: 1 };
    });
    let frame = 0;
    function tick() {
        frame++;
        burstCtx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.life <= 0) return;
            p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life -= 0.022;
            if (p.life > 0) {
                alive = true;
                burstCtx.globalAlpha = Math.max(p.life, 0);
                burstCtx.fillStyle = p.color;
                burstCtx.beginPath(); burstCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); burstCtx.fill();
            }
        });
        burstCtx.globalAlpha = 1;
        if (alive && frame < 90) requestAnimationFrame(tick);
        else burstCtx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
    }
    tick();
}

// ══════════════════════════════════════════════════════════════
// COUNT-UP — animates a number from its current value to a new target
// ══════════════════════════════════════════════════════════════
function animateCountUp(el, from, to, duration = 700) {
    if (!el) return;
    const start = performance.now();
    const diff = to - from;
    function step(now) {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        el.textContent = fmtWTC(from + diff * eased);
        if (t < 1) requestAnimationFrame(step);
        else el.textContent = fmtWTC(to);
    }
    requestAnimationFrame(step);
}

const HISTORY_STATUS_UI = {
    pending:  { label: 'Pending',  icon: '🕓', color: 'var(--signal)' },
    approved: { label: 'Received', icon: '✅', color: 'var(--success)' },
};
async function openHistoryModal() {
    const root = document.getElementById('modal-root');
    root.innerHTML = `
        <div class="overlay">
            <div class="sheet" style="max-height:78vh; display:flex; flex-direction:column;">
                <div class="sheet-handle"></div>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
                    <div style="font-family:var(--font-display); font-weight:700; font-size:18px;">🕓 Withdraw History</div>
                    <button class="icon-btn" onclick="document.getElementById('modal-root').innerHTML=''" aria-label="Close">✕</button>
                </div>
                <div id="history-list" style="overflow-y:auto; flex:1;">
                    <div class="muted" style="text-align:center; padding:30px 0;">Loading...</div>
                </div>
            </div>
        </div>`;

    try {
        const r = await apiGet(`withdraw?action=history&initData=${encodeURIComponent(TG_INIT_DATA)}`);
        const listEl = document.getElementById('history-list');
        if (!listEl) return; // modal closed before response arrived

        // ⚠️ FIX: previously r.history was filtered directly without checking
        // r.ok first — so any auth/server error silently showed "no requests"
        // instead, and the real cause was never visible. Errors are now shown
        // explicitly and separately.
        if (!r.ok) {
            console.error('history fetch failed:', r.error, r.reason);
            listEl.innerHTML = `<div class="muted" style="text-align:center; padding:30px 0;">Couldn't load history (${r.error || 'unknown'}). Close the app and reopen it.</div>`;
            return;
        }

        const items = (r.history || []).filter(h => h.status === 'pending' || h.status === 'approved');

        if (!items.length) {
            listEl.innerHTML = `<div class="muted" style="text-align:center; padding:30px 0;">No withdraw requests yet.</div>`;
            return;
        }

        listEl.innerHTML = items.map((h, i) => {
            const st = HISTORY_STATUS_UI[h.status] || { label: h.status, icon: '•', color: 'var(--ink-muted)' };
            const date = h.createdAt ? new Date(h.createdAt).toLocaleString() : '';
            return `
                <div class="card" style="margin-bottom:10px; opacity:0; animation: jg-rise 0.35s ease ${Math.min(i * 0.05, 0.4)}s forwards;">
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <div>
                            <div style="font-weight:700; font-size:15px;">${fmtWTC(h.wtcAmount)} WTC</div>
                            <div class="muted" style="font-size:12px; margin-top:2px;">≈ ${Number(h.cashAmount || 0).toFixed(4)} ${h.currency || ''} · ${date}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:${st.color}22; color:${st.color}; font-size:12px; font-weight:700; white-space:nowrap;">
                            ${st.icon} ${st.label}
                        </div>
                    </div>
                </div>`;
        }).join('');
    } catch (e) {
        const listEl = document.getElementById('history-list');
        if (listEl) listEl.innerHTML = `<div class="muted" style="text-align:center; padding:30px 0;">Failed to load history.</div>`;
    }
}

function switchTab(tabId) {
    if (state.activeTab === 'home' && tabId !== 'home' && _tickerInterval) { clearInterval(_tickerInterval); _tickerInterval = null; }
    state.activeTab = tabId;
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
    const renderers = { home: renderHome, video: renderVideoTab, earning: renderEarningTab, task: renderTaskTab, refer: renderReferTab };
    renderers[tabId]();
    requestAnimationFrame(() => { document.getElementById('tab-content')?.classList.add('tab-fade'); });
}

// HOME — live "recently withdrawn" ticker (real approved withdraws, username masked)
// ══════════════════════════════════════════════════════════════
let _tickerInterval = null;
async function startWithdrawTicker() {
    if (_tickerInterval) { clearInterval(_tickerInterval); _tickerInterval = null; }
    const textEl = document.getElementById('wd-ticker-text');
    if (!textEl) return;

    let items = [];
    try {
        const r = await apiGet('data?type=recentWithdrawals');
        items = r.items || [];
    } catch { /* ignore — ticker just won't show */ }

    const liveTextEl = document.getElementById('wd-ticker-text'); // re-check, tab may have switched during fetch
    if (!liveTextEl) return;

    if (!items.length) {
        liveTextEl.textContent = '💸 Withdraw your earnings straight to TON/USDT!';
        return;
    }

    let idx = 0;
    const show = (i) => {
        const el = document.getElementById('wd-ticker-text');
        if (!el) { clearInterval(_tickerInterval); _tickerInterval = null; return; }
        const w = items[i];
        el.style.opacity = '0';
        setTimeout(() => {
            const el2 = document.getElementById('wd-ticker-text');
            if (!el2) return;
            el2.textContent = `${w.username} just withdrew ${Number(w.cashAmount).toFixed(2)} ${w.currency} 🎉`;
            el2.style.opacity = '1';
        }, 350);
    };
    show(idx);
    _tickerInterval = setInterval(() => { idx = (idx + 1) % items.length; show(idx); }, 3500);
}

                        <div style="font-family:var(--font-display); font-weight:700; font-size:24px; margin-top:4px; color:var(--coin);">${fmtWTC(u.wtcBalance)} <span style="font-size:13px; color:var(--ink-muted); font-weight:500;">WTC</span></div>
                    </div>

                    <div class="field-label">Amount to convert — minimum ${fmtWTC(CONVERT_MIN_WTC)} WTC</div>
                    <input class="field-input" id="cv-amount" type="number" placeholder="${CONVERT_MIN_WTC}">

                    <div class="card" style="margin-top:12px; padding:14px;">
                        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;">
                            <span class="muted">Gross value</span><span id="cv-gross">$0.0000</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;">
                            <span class="muted">Fee (25%)</span><span id="cv-fee" style="color:var(--danger);">-$0.0000</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:700; padding-top:8px; border-top:1px solid var(--border);">
                            <span>You'll receive</span><span id="cv-net" style="color:var(--money);">$0.0000</span>
                        </div>
                    </div>

                    <button class="btn" style="margin-top:16px; background:linear-gradient(160deg, var(--accent), #0891B2); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 8px 18px var(--accent-soft); color:#052029;" id="cv-submit" disabled>Enter an amount</button>
                </div>
            </div>
        </div>`;

    const amountEl = document.getElementById('cv-amount');
    const submitBtn = document.getElementById('cv-submit');

    amountEl.oninput = () => {
        const wtc = parseFloat(amountEl.value) || 0;
        const gross = wtc / CONVERT_RATE;
        const fee = gross * (CONVERT_FEE_PERCENT / 100);
        const net = gross - fee;
        document.getElementById('cv-gross').textContent = `$${gross.toFixed(4)}`;
        document.getElementById('cv-fee').textContent = `-$${fee.toFixed(4)}`;
        document.getElementById('cv-net').textContent = `$${net.toFixed(4)}`;

        if (wtc < CONVERT_MIN_WTC) { submitBtn.disabled = true; submitBtn.textContent = `Minimum ${CONVERT_MIN_WTC} WTC`; }
        else if (wtc > (u.wtcBalance || 0)) { submitBtn.disabled = true; submitBtn.textContent = `Insufficient WTC balance`; }
        else { submitBtn.disabled = false; submitBtn.textContent = `Convert ${fmtWTC(wtc)} WTC`; }
    };

    submitBtn.onclick = async () => {
        const wtcAmount = Math.floor(parseFloat(amountEl.value) || 0);
        if (wtcAmount < CONVERT_MIN_WTC) return toast(`Minimum ${CONVERT_MIN_WTC} WTC required.`, 'error');
        submitBtn.disabled = true; submitBtn.textContent = 'Converting...';
        const r = await apiPost('withdraw', { action: 'convert', wtcAmount });
        if (r.ok) {
            toast(`Converted! +$${r.netUsd.toFixed(4)} added to your withdrawable balance.`, 'success');
            triggerBurst(submitBtn);
            setTimeout(() => { document.getElementById('modal-root').innerHTML = ''; }, 250);
            await refreshUser();
            if (state.activeTab === 'home') renderHome();
        } else {
            toast(r.message || errorText(r.error), 'error');
            amountEl.oninput();
        }
    };
}

// ══════════════════════════════════════════════════════════════
// WITHDRAW MODAL — now a 2-STEP WIZARD:
//   Step 1 "requirements" — global gate: 15 ads watched today + 10 tasks
//           completed lifetime (fetched from withdraw?action=tiers'
//           `withdrawRequirements` field, same call the tier list already
//           needed — no extra endpoint).
//   Step 2 "form"         — unchanged tier + method/address picker, only
//           reachable once step 1's requirements are met.
// ══════════════════════════════════════════════════════════════
function openWithdrawModal() {
    let step = 'requirements';
    let method = 'binance';
    let selectedTierId = null;
    let tiers = [];
    let addressLock = null; // { method, address, daysLeft } or null
    let requirements = null; // { adsRequired, adsWatchedToday, adsMet, tasksRequired, tasksHave, tasksMet }
    let loadFailed = false;

    // ── STEP 1 — requirements gate ──
    function renderRequirements() {
        const r = requirements;
        const adsPct = r ? Math.min(100, Math.round((r.adsWatchedToday / r.adsRequired) * 100)) : 0;
        const tasksPct = r ? Math.min(100, Math.round((r.tasksHave / r.tasksRequired) * 100)) : 0;
        const allMet = !!(r && r.adsMet && r.tasksMet);

        function reqCard(label, have, need, pct, met, hue, hint) {
            return `
            <div class="card" style="padding:14px; margin-bottom:10px; border-color:${met ? 'rgba(34,197,94,0.35)' : 'var(--border)'};">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                    <div style="display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600;">
                        <span style="width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; ${met ? 'background:var(--success); color:#04140A;' : 'border:1.5px solid var(--border-strong);'}">${met ? '✓' : ''}</span>
                        ${label}
                    </div>
                    <span style="font-size:12.5px; font-weight:600; color:${met ? 'var(--success)' : 'var(--ink-muted)'};">${have}/${need}</span>
                </div>
                <div style="height:6px; border-radius:4px; background:var(--surface); overflow:hidden;">
                    <div style="height:100%; width:${pct}%; background:${met ? 'var(--success)' : hue}; border-radius:4px; transition:width 0.3s ease;"></div>
                </div>
                ${!met && hint ? `<div class="muted" style="font-size:11.5px; margin-top:8px;">${hint}</div>` : ''}
            </div>`;
        }

        document.getElementById('modal-root').innerHTML = `
            <div class="overlay" onclick="if(event.target===this)this.remove()">
                <div class="sheet anim-in" style="position:relative; overflow:hidden;">
                    <div class="jg-glow" style="opacity:0.5;"></div>
                    <div class="sheet-handle" style="position:relative; z-index:1;"></div>
                    <div style="position:relative; z-index:1;">
                        <div class="section-title" style="margin-bottom:4px;">Withdraw — Requirements</div>
                        <div class="muted" style="font-size:12px; margin-bottom:16px;">Complete both before choosing an amount.</div>

                        ${!r ? `
                            <div class="muted" style="text-align:center; padding:28px 0;">${loadFailed ? "Couldn't load — try again." : 'Loading...'}</div>
                        ` : `
                            ${reqCard(`Complete ${r.tasksRequired} tasks (lifetime)`, r.tasksHave, r.tasksRequired, tasksPct, r.tasksMet, 'var(--task-hue)', `Head to the Tasks tab — ${Math.max(0, r.tasksRequired - r.tasksHave)} more to go.`)}
                            ${reqCard(`Watch ${r.adsRequired} ads (today)`, r.adsWatchedToday, r.adsRequired, adsPct, r.adsMet, 'var(--video-hue)', `Head to the Earn tab — ${Math.max(0, r.adsRequired - r.adsWatchedToday)} more ads today.`)}
                        `}

                        <button class="btn" id="wd-req-next" style="margin-top:6px; background:linear-gradient(160deg, var(--money), #16A34A); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 8px 18px var(--money-soft);" ${allMet ? '' : 'disabled'}>${!r ? (loadFailed ? 'Retry' : 'Loading...') : (allMet ? '→ Next' : 'Complete requirements above')}</button>
                    </div>
                </div>
            </div>`;

        const nextBtn = document.getElementById('wd-req-next');
        if (!nextBtn) return;
        if (loadFailed) { nextBtn.onclick = () => { loadFailed = false; renderRequirements(); loadRequirements(); }; return; }
        if (allMet) nextBtn.onclick = () => { step = 'form'; renderForm(); };
    }

    async function loadRequirements() {
        const r = await apiGet(`withdraw?action=tiers&initData=${encodeURIComponent(TG_INIT_DATA)}`);
        if (!r.ok) {
            loadFailed = true;
            if (step === 'requirements') renderRequirements();
            return;
        }
        tiers = r.tiers;
        addressLock = r.addressLock || null;
        requirements = r.withdrawRequirements || { adsRequired: WITHDRAW_ADS_REQUIRED, adsWatchedToday: 0, adsMet: false, tasksRequired: WITHDRAW_TASKS_REQUIRED, tasksHave: 0, tasksMet: false };
        if (addressLock) method = addressLock.method;
        if (step === 'requirements') renderRequirements();
    }

    // ── STEP 2 — tier + method/address (same UI as before, minus the network call — tiers/addressLock already loaded in step 1) ──
    function renderForm() {
        const m = WITHDRAW_METHODS_UI[method];
        const locked = !!addressLock;
        document.getElementById('modal-root').innerHTML = `
            <div class="overlay" onclick="if(event.target===this)this.remove()">
                <div class="sheet anim-in" style="max-height:86vh; display:flex; flex-direction:column; position:relative; overflow:hidden;">
                    <div class="jg-glow" style="opacity:0.5;"></div>
                    <div class="sheet-handle" style="position:relative; z-index:1;"></div>
                    <button id="wd-back" style="position:relative; z-index:1; background:none; border:none; color:var(--ink-muted); font-size:12.5px; display:flex; align-items:center; gap:4px; margin-bottom:8px; padding:0;">← Requirements</button>
                    <div class="card" style="position:relative; z-index:1; text-align:center; padding:18px; margin-bottom:14px; border-color:var(--money-soft);">
                        <div class="muted" style="font-size:11px; letter-spacing:0.06em; text-transform:uppercase;">Withdrawable balance</div>
                        <div style="font-family:var(--font-display); font-weight:700; font-size:30px; margin-top:4px; color:var(--money); text-shadow:0 0 18px var(--money-soft);">$${(state.user?.usdtBalance || 0).toFixed(2)} <span style="font-size:14px; color:var(--ink-muted); font-weight:500;">USDT</span></div>
                        <div class="muted" style="font-size:11.5px; margin-top:6px;">Need more? <a href="#" id="wd-go-convert" style="color:var(--accent); font-weight:600;">Convert WTC first →</a></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; position:relative; z-index:1;">
                        <button class="btn ${method==='binance'?'btn-primary':'btn-outline'}" id="m-binance" ${locked ? 'disabled' : ''}>Binance</button>
                        <button class="btn ${method==='tonkeeper'?'btn-primary':'btn-outline'}" id="m-tonkeeper" ${locked ? 'disabled' : ''}>Tonkeeper</button>
                    </div>
                    <div class="field-label" style="position:relative; z-index:1;">${m.label}</div>
                    <input class="field-input" id="wd-details" placeholder="${m.placeholder}" style="position:relative; z-index:1;" ${locked ? 'readonly' : ''}>
                    ${method === 'tonkeeper' && !locked ? `<div class="muted" style="font-size:11.5px; margin-top:5px; position:relative; z-index:1;">💡 Paste your TON wallet address — you'll receive <b>USDT</b> (USDT-on-TON) at this address, not native TON.</div>` : ''}
                    ${locked ? `<div class="muted" style="font-size:11.5px; margin-top:6px; position:relative; z-index:1; color:var(--task-hue);">🔒 Your withdraw address is locked for <b>${addressLock.daysLeft} more day(s)</b> — you can only withdraw to this same address until then.</div>` : ''}

                    <div class="section-title" style="margin:16px 0 10px; position:relative; z-index:1;">Choose a cash-out amount</div>
                    <div style="overflow-y:auto; flex:1; position:relative; z-index:1;">
                        <div id="wd-tier-list"></div>
                    </div>

                    <div class="card" style="margin-top:14px; font-size:12px; color:var(--ink-muted); line-height:1.6; position:relative; z-index:1;">
                        No fee here — the 25% fee is already taken when you convert WTC to USDT. Your payout address locks for 30 days after your first withdrawal.
                    </div>
                    <button class="btn" style="margin-top:16px; position:relative; z-index:1; background:linear-gradient(160deg, var(--money), #16A34A); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 8px 18px var(--money-soft);" id="wd-submit" disabled>Select a tier first</button>
                </div>
            </div>`;
        document.getElementById('wd-back').onclick = () => { step = 'requirements'; renderRequirements(); loadRequirements(); };
        document.getElementById('wd-go-convert').onclick = (e) => { e.preventDefault(); openConvertModal(); };
        document.getElementById('m-binance').onclick = () => { method = 'binance'; renderForm(); };
        document.getElementById('m-tonkeeper').onclick = () => { method = 'tonkeeper'; renderForm(); };
        document.getElementById('wd-submit').onclick = submitWithdraw;
        if (locked) { const df = document.getElementById('wd-details'); if (df) df.value = addressLock.address; }
        renderTierList();
    }

    function renderTierList() {
        const listEl = document.getElementById('wd-tier-list');
        if (!listEl) return;
        listEl.innerHTML = tiers.map(t => {
            const locked = !t.referralsMet;
            const exhausted = t.monthlyLimitReached;
            const disabled = locked || exhausted || !t.balanceOk;
            const selected = selectedTierId === t.id;
            let statusLine;
            if (locked) statusLine = `🔒 Need ${t.referralsRequired} referrals (you have ${t.referralsHave})`;
            else if (exhausted) statusLine = `⏳ Used up — resets every 6 months`;
            else if (!t.balanceOk) statusLine = `Need $${t.usd} converted (${t.claimsLeft}/${t.monthlyLimit} claims left)`;
            else statusLine = `✅ ${t.claimsLeft}/${t.monthlyLimit} claims left this period`;
            return `
            <button class="wd-tier-btn ${selected ? 'wd-tier-selected' : ''}" data-tier="${t.id}" ${disabled ? 'disabled' : ''}>
                ${selected ? '<div class="wd-tier-check">✓</div>' : ''}
                <div class="wd-tier-usd">$${t.usd}</div>
                <div class="wd-tier-wtc">No fee here — you receive the full $${t.usd}</div>
                <div class="wd-tier-status" style="color:${disabled ? 'var(--ink-faint)' : 'var(--ink-muted)'};">${statusLine}</div>
            </button>`;
        }).join('');
        listEl.querySelectorAll('.wd-tier-btn:not([disabled])').forEach(btn => {
            btn.onclick = () => { selectedTierId = btn.dataset.tier; renderTierList(); updateSubmitBtn(); };
        });
        updateSubmitBtn();
    }

    function updateSubmitBtn() {
        const btn = document.getElementById('wd-submit');
        if (!btn) return;
        const tier = tiers.find(t => t.id === selectedTierId);
        if (!tier) { btn.disabled = true; btn.textContent = 'Select a tier first'; return; }
        btn.disabled = false;
        btn.textContent = `Withdraw $${tier.usd}`;
    }

    async function submitWithdraw() {
        const details = document.getElementById('wd-details').value.trim();
        if (!details) return toast('Please enter your address/UID.', 'error');
        if (!selectedTierId) return toast('Please select a tier.', 'error');
        const btn = document.getElementById('wd-submit');
        btn.textContent = 'Submitting...'; btn.disabled = true;
        const r = await apiPost('withdraw', { method, details, tierId: selectedTierId });
        if (r.ok) {
            toast('Withdraw request submitted — you\'ll be paid once approved.', 'success');
            triggerBurst(btn);
            setTimeout(() => { document.getElementById('modal-root').innerHTML = ''; }, 200);
            await refreshUser();
            if (state.activeTab === 'home') renderHome();
        } else {
            // ⚠️ If the atomic gate in withdraw.js rejects because ads/tasks slipped
            // below requirement between step 1 and submit (e.g. a concurrent reset,
            // or the user took a long time on step 2 crossing midnight BD time),
            // send them back to step 1 instead of just toasting an error in place —
            // the form step no longer shows ads/task status, so silently failing
            // here would leave the user stuck without knowing why.
            if (r.error === 'insufficient_ads' || r.error === 'need_5_tasks') {
                toast(r.message || errorText(r.error), 'error');
                step = 'requirements';
                renderRequirements();
                loadRequirements();
                return;
            }
            toast(r.message || errorText(r.error), 'error');
            updateSubmitBtn();
            btn.disabled = false;
        }
    }

    renderRequirements();
    loadRequirements();
}

// PROMO MODAL
// ══════════════════════════════════════════════════════════════
function openPromoModal() {
    document.getElementById('modal-root').innerHTML = `
        <div class="overlay" onclick="if(event.target===this)this.remove()">
            <div class="sheet anim-in">
                <div class="sheet-handle"></div>
                <div style="font-weight:600; font-size:16px; margin-bottom:4px;">Promo code</div>
                <div class="muted" style="font-size:13px; margin-bottom:16px;">Redeem a code for extra WTC.</div>
                <input class="field-input" id="promo-code" placeholder="Enter 6-digit code" style="text-align:center; font-family:var(--font-display); font-size:18px; letter-spacing:3px;">
                <button class="btn btn-primary" style="margin-top:16px;" id="promo-submit">Redeem</button>
            </div>
        </div>`;
    document.getElementById('promo-submit').onclick = async () => {
        const code = document.getElementById('promo-code').value.trim();
        if (!code) return toast('Please enter a code.', 'error');
        const btn = document.getElementById('promo-submit');
        btn.textContent = 'Loading ad...'; btn.disabled = true;

        // ── Shows a real ad before redeeming the promo code (same pattern as
        // the lootbox claim) — this step didn't exist before, so no ad was ever
        // shown. The code won't be redeemed until the ad finishes, so there's no
        // risk of wasting a single-use code.
        const candidates = [showAdsgramDailyAd, showAdsgramSpecialAd, showMonetagAd];
        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        try {
            await pick();
        } catch (e) {
            toast(errorText(e.message), 'error');
            btn.textContent = 'Redeem'; btn.disabled = false;
            return;
        }

        btn.textContent = 'Checking...';
        const r = await apiPost('earn', { action: 'claimPromo', code });
        if (r.ok) {
            toast(`+${r.reward} WTC added!`, 'success');
            triggerBurst(btn);
            showCongrats(`+${r.reward} WTC`, '🎁');
            setTimeout(() => { document.getElementById('modal-root').innerHTML = ''; }, 200);
            await refreshUser();
            if (state.activeTab === 'home') renderHome();
        } else {
            toast(errorText(r.error), 'error');
            btn.textContent = 'Redeem'; btn.disabled = false;
        }
    };
}

async function renderVideoTab() {
    const root = document.getElementById('tab-content');
    root.innerHTML = `
        <div class="section-pad" style="margin-top:18px;">
            <div class="section-title" style="margin-bottom:14px;">Watch videos, earn WTC</div>
            <div id="video-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
        </div>`;

    const r = await apiGet('data?type=videos');

    } else {
        grid.innerHTML = state.videos.map((v, i) => `
            <div class="video-thumb" data-idx="${i}" style="cursor:pointer;">
