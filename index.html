<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEWTUBE — Watch & Earn</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #16151B;
        --surface: #1F1E26;
        --surface-raised: #28262F;
        --surface-pop: #2F2D38;
        --coin: #F2A93B;
        --coin-deep: #C97F1B;
        --coin-soft: rgba(242,169,59,0.14);
        --signal: #3FD2C7;
        --signal-soft: rgba(63,210,199,0.12);
        --ink: #F5F1E8;
        --ink-muted: #9B968C;
        --ink-faint: #6B675F;
        --border: rgba(245,241,232,0.07);
        --border-strong: rgba(245,241,232,0.14);
        --danger: #E0594F;
        --danger-soft: rgba(224,89,79,0.14);
        --success: #5DCAA5;
        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Plus Jakarta Sans', 'Noto Sans Bengali', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); }
    body {
        color: var(--ink);
        font-family: var(--font-body);
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 96px;
        overflow-x: hidden;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    .hidden { display: none !important; }
    img { max-width: 100%; display: block; }

    /* ── top bar ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 8px; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--coin); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: #1A1206; }
    .brand-name { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: 0.2px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: none; display: flex; align-items: center; justify-content: center; color: var(--ink); position: relative; }
    .icon-btn.has-dot::after { content: ''; position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }

    /* ── shared cards/buttons ── */
    .card { background: var(--surface); border-radius: 16px; padding: 16px 18px; border: 0.5px solid var(--border); }
    .btn { height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; font-size: 14px; border: none; width: 100%; }
    .btn-primary { background: var(--coin); color: #1A1206; }
    .btn-outline { background: transparent; border: 0.5px solid var(--border-strong); color: var(--ink); }
    .btn-signal { background: var(--signal); color: #062420; }
    .btn:disabled { opacity: 0.45; }
    .section-pad { padding: 0 20px; }
    .section-title { font-size: 15px; font-weight: 600; }
    .muted { color: var(--ink-muted); }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .pill-signal { background: var(--signal-soft); color: var(--signal); }
    .pill-coin { background: var(--coin-soft); color: var(--coin); }

    /* ── bottom nav ── */
    .bottomnav { position: fixed; bottom: 14px; left: 0; right: 0; max-width: 440px; margin: 0 auto; background: var(--surface-raised); border-radius: 22px; display: flex; align-items: center; justify-content: space-around; padding: 10px 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.45); z-index: 40; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ink-faint); width: 56px; background: none; border: none; padding: 4px 0; }
    .nav-item.active { color: var(--coin); }
    .nav-label { font-size: 10px; font-weight: 500; }
    .nav-earn { width: 56px; height: 56px; border-radius: 50%; background: var(--coin); display: flex; align-items: center; justify-content: center; margin-top: -28px; box-shadow: 0 6px 16px rgba(242,169,59,0.4); color: #1A1206; }

    /* ── toast ── */
    #toast-host { position: fixed; top: 14px; left: 0; right: 0; max-width: 430px; margin: 0 auto; z-index: 200; pointer-events: none; padding: 0 16px; }
    .toast { background: var(--surface-pop); border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: toast-in 0.25s ease; }
    .toast.success { border-color: rgba(93,202,165,0.4); }
    .toast.error { border-color: rgba(224,89,79,0.4); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── modal overlay (in-flow style, never position:fixed for inner content) ── */
    .overlay { position: fixed; inset: 0; background: rgba(10,9,12,0.78); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: 22px 22px 0 0; padding: 22px 20px 28px; max-height: 86vh; overflow-y: auto; }
    .sheet-fullscreen { width: 100%; max-width: 480px; background: var(--bg); border-radius: 0; padding: 0; max-height: 100vh; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sheet-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 4px; margin: 0 auto 16px; }
    .field-label { font-size: 13px; color: var(--ink-muted); margin: 14px 0 6px; }
    .field-input { width: 100%; height: 46px; border-radius: 12px; background: var(--surface-raised); border: 0.5px solid var(--border); color: var(--ink); padding: 0 14px; font-size: 14px; }
    .field-select { width: 100%; height: 46px; border-radius: 12px; background: var(--surface-raised); border: 0.5px solid var(--border); color: var(--ink); padding: 0 14px; font-size: 14px; }
</style>
</head>
<body>

<div id="toast-host"></div>

<div id="app-root"></div>

<div id="modal-root"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// CONFIG — এই অংশটা আপনার আসল তথ্য দিয়ে বদলে নিন
// ══════════════════════════════════════════════════════════════
const API_BASE = 'https://newtube-ton.vercel.app/api';
const MINI_APP_BASE = 'https://t.me/NewTube12_bot/WatchTo_Earn';

// ── Telegram WebApp init ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── অ্যাপ-জুড়ে শেয়ার করা স্টেট ──
const state = {
    user: null,
    videos: [],
    tasks: [],
    leaderboard: [],
    activeTab: 'home',
    videoSession: null,
};

// ══════════════════════════════════════════════════════════════
// TOAST — error/success notification (raw error message কখনো দেখানো হয় না)
// ══════════════════════════════════════════════════════════════
function toast(message, type = 'info') {
    const host = document.getElementById('toast-host');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = message;
    host.appendChild(el);
    setTimeout(() => el.remove(), 3200);
}

const ERROR_MESSAGES = {
    below_minimum: 'এখনও মিনিমাম পরিমাণে পৌঁছায়নি।',
    daily_limit_reached: 'আজকের জন্য সীমা শেষ — কাল আবার আসুন।',
    daily_watch_limit_reached: 'আজ ১০ ঘণ্টা ভিডিও দেখার সীমা শেষ হয়ে গেছে।',
    ad_required: 'আগে একটা বিজ্ঞাপন দেখতে হবে।',
    insufficient_balance: 'ব্যালেন্স পর্যাপ্ত নেই।',
    insufficient_ads: 'এই withdraw-এর জন্য আরও বিজ্ঞাপন দেখা লাগবে।',
    need_5_tasks: 'প্রথম withdraw করার আগে অন্তত ৫টা টাস্ক সম্পন্ন করুন।',
    already_withdrawn_today: 'আজ একবার withdraw করেছেন — কাল আবার চেষ্টা করুন।',
    address_used_by_other: 'এই অ্যাড্রেস অন্য অ্যাকাউন্ট ব্যবহার করছে।',
    banned: 'আপনার অ্যাকাউন্ট সাসপেন্ড করা হয়েছে।',
    not_member: 'প্রথমে চ্যানেল/গ্রুপে join করুন।',
    invalid_code: 'কোডটি ভুল বা মেয়াদ শেষ।',
    already_used: 'এই কোড আগেই ব্যবহার করেছেন।',
    fully_used: 'এই কোডের সব ব্যবহার শেষ হয়ে গেছে।',
    expired: 'কোডের মেয়াদ শেষ।',
    task_full: 'এই টাস্কের কোটা পূর্ণ হয়ে গেছে।',
    conflict_retry: 'একটু আগে আবার চেষ্টা করুন।',
    server_error: 'সার্ভারে সমস্যা হয়েছে, একটু পরে চেষ্টা করুন।',
};
function errorText(code) { return ERROR_MESSAGES[code] || 'কিছু একটা সমস্যা হয়েছে, আবার চেষ্টা করুন।'; }

// ══════════════════════════════════════════════════════════════
// API helpers
// ══════════════════════════════════════════════════════════════
async function apiPost(path, body) {
    try {
        const res = await fetch(`${API_BASE}/${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        return await res.json();
    } catch (e) {
        return { ok: false, error: 'server_error' };
    }
}
async function apiGet(path) {
    try {
        const res = await fetch(`${API_BASE}/${path}`);
        return await res.json();
    } catch (e) {
        return { ok: false, error: 'server_error' };
    }
}

function fmtWTC(n) { return Math.floor(n || 0).toLocaleString('en-US'); }
function wtcToUsd(wtc) { return (wtc / 20000).toFixed(4); }

// ══════════════════════════════════════════════════════════════
// ONBOARDING — প্রথমবার app খোলার সময় ৩ স্টেপ
// ══════════════════════════════════════════════════════════════
const ONBOARD_KEY = 'newtube_onboarded_v1';

function showOnboarding(onDone) {
    if (localStorage.getItem(ONBOARD_KEY)) { onDone(); return; }

    let step = 0;
    const steps = [
        {
            icon: '🎬', // visual-only emoji inside the real deployed app is fine, this isn't a claude.ai widget
            title: 'NEWTUBE-তে স্বাগতম',
            body: 'ভিডিও দেখে রিয়েল ক্রিপ্টো আয় করুন — সম্পূর্ণ ফ্রি, কোনো বিনিয়োগ লাগবে না।',
            cta: 'এগিয়ে যান',
        },
        {
            icon: '▶',
            title: 'Watch video to earn',
            body: 'যত ভিডিও দেখবেন তত WTC জমা হবে। সম্পূর্ণ ফ্রি — just watch & monetize, no investment ever.',
            cta: 'এগিয়ে যান',
        },
        {
            icon: '📋',
            title: 'নিয়মাবলী',
            body: 'একটা ডিভাইসে একটাই অ্যাকাউন্ট চলবে — একাধিক অ্যাকাউন্ট খুললে ব্যান হয়ে যাবেন। কোনো বিনিয়োগ লাগবে না, শুধু ফ্রি ভিডিও দেখে আয়। Withdraw-এ সামান্য (৫%) ফি কাটা হয়। অস্বাভাবিক/বট কার্যকলাপ ধরা পড়লে ব্যালেন্স আটকে দেওয়া হতে পারে।',
            cta: null, // confirm checkbox দেখাবে
        },
    ];

    function render() {
        const s = steps[step];
        const root = document.getElementById('modal-root');
        root.innerHTML = `
            <div class="overlay" style="align-items:center;">
                <div class="sheet" style="border-radius:22px; text-align:center; padding: 32px 24px;">
                    <div style="font-size:48px; margin-bottom:18px;">${s.icon}</div>
                    <div style="font-family:var(--font-display); font-weight:700; font-size:20px; margin-bottom:10px;">${s.title}</div>
                    <div class="muted" style="font-size:14px; line-height:1.6; margin-bottom:22px;">${s.body}</div>
                    <div style="display:flex; justify-content:center; gap:6px; margin-bottom:20px;">
                        ${steps.map((_, i) => `<div style="width:${i===step?20:6}px; height:6px; border-radius:4px; background:${i===step?'var(--coin)':'var(--border-strong)'};"></div>`).join('')}
                    </div>
                    ${s.cta ? `<button class="btn btn-primary" id="ob-next">${s.cta}</button>` : `
                        <label style="display:flex; align-items:flex-start; gap:10px; text-align:left; margin-bottom:18px; font-size:13px; color:var(--ink-muted);">
                            <input type="checkbox" id="ob-confirm-box" style="margin-top:3px;">
                            আমি নিয়মাবলী পড়েছি এবং একমত
                        </label>
                        <button class="btn btn-primary" id="ob-done" disabled>শুরু করুন</button>
                    `}
                </div>
            </div>`;

        if (s.cta) {
            document.getElementById('ob-next').onclick = () => { step++; render(); };
        } else {
            const box = document.getElementById('ob-confirm-box');
            const done = document.getElementById('ob-done');
            box.onchange = () => { done.disabled = !box.checked; };
            done.onclick = () => {
                localStorage.setItem(ONBOARD_KEY, '1');
                document.getElementById('modal-root').innerHTML = '';
                onDone();
            };
        }
    }
    render();
}

// ══════════════════════════════════════════════════════════════
// JOIN-GATE — channel + community join বাধ্যতামূলক, leave করলে আবার দেখাবে
// ══════════════════════════════════════════════════════════════
function showJoinGate(opts, onJoined) {
    const root = document.getElementById('modal-root');
    const heading = opts.leftAfterVerifying
        ? 'আপনি চ্যানেল/কমিউনিটি ছেড়ে দিয়েছেন'
        : 'চালিয়ে যাওয়ার আগে join করুন';
    const sub = opts.leftAfterVerifying
        ? 'NEWTUBE ব্যবহার চালিয়ে যাওয়ার জন্য আবার join করতে হবে।'
        : 'NEWTUBE ব্যবহার করতে হলে আমাদের official channel ও community-তে join করা বাধ্যতামূলক।';

    root.innerHTML = `
        <div class="overlay" style="align-items:center;">
            <div class="sheet" style="border-radius:22px; text-align:center; padding: 30px 22px;">
                <div style="font-size:42px; margin-bottom:14px;">📢</div>
                <div style="font-family:var(--font-display); font-weight:700; font-size:18px; margin-bottom:8px;">${heading}</div>
                <div class="muted" style="font-size:13px; line-height:1.6; margin-bottom:20px;">${sub}</div>
                <a href="https://t.me/${OFFICIAL_CHANNEL}" target="_blank" class="btn btn-outline" style="margin-bottom:10px;">চ্যানেলে join করুন</a>
                <a href="https://t.me/${COMMUNITY_GROUP}" target="_blank" class="btn btn-outline" style="margin-bottom:16px;">কমিউনিটিতে join করুন</a>
                <button class="btn btn-primary" id="jg-check">✅ Join করেছি, চেক করুন</button>
            </div>
        </div>`;

    document.getElementById('jg-check').onclick = async () => {
        const btn = document.getElementById('jg-check');
        btn.textContent = 'চেক করা হচ্ছে...'; btn.disabled = true;
        const r = await apiGet(`user?action=checkJoin&userId=${USER_ID}`);
        if (r.joined) {
            root.innerHTML = '';
            onJoined();
        } else {
            btn.textContent = '✅ Join করেছি, চেক করুন'; btn.disabled = false;
            toast('এখনও দুটো জায়গায় join করা হয়নি।', 'error');
        }
    };
}

// প্রতি ৬০ সেকেন্ডে membership চেক — leave করলে ধরা পড়বে
function startJoinWatcher() {
    setInterval(async () => {
        if (document.getElementById('modal-root').innerHTML.includes('jg-check')) return; // already showing
        const r = await apiGet(`user?action=checkJoin&userId=${USER_ID}`);
        if (!r.joined) {
            showJoinGate({ leftAfterVerifying: r.leftAfterVerifying }, () => {});
        }
    }, 60000);
}

function switchTab(tabId) {
    state.activeTab = tabId;
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
    });

let sessionEarnedTotal = 0;

async function startVideoSession() {
    sessionEarnedTotal = 0;
    const startRes = await apiPost('earn', { action: 'videoStart', userId: USER_ID });
    if (!startRes.success) { toast('ভিডিও সেশন শুরু করা যায়নি।', 'error'); return; }
    state.videoSession = { startTime: startRes.startTime, signature: startRes.signature };

    state.videoSessionInterval = setInterval(async () => {
        if (!state.videoSession) return;
        const elapsedSec = Math.floor((Date.now() - state.videoSession.startTime) / 1000);
        const claimable = Math.floor(elapsedSec * (1 / 60)); // VIDEO_WTC_PER_SECOND
        if (claimable <= 0) return;

        const r = await apiPost('earn', {
            action: 'videoClaim', userId: USER_ID,
            startTime: state.videoSession.startTime, signature: state.videoSession.signature,
            claimedPoints: claimable,
        });
        if (r.ok) {
            sessionEarnedTotal += r.pendingVideoWTC !== undefined ? claimable : 0;
            const out = document.getElementById('vp-session-wtc');
            if (out) out.textContent = `${sessionEarnedTotal} WTC`;
            if (state.user) state.user.pendingVideoWTC = r.pendingVideoWTC;
            renderFloatingLootbox();
            // পরের রাউন্ডের জন্য নতুন signed token নিন
            const fresh = await apiPost('earn', { action: 'videoStart', userId: USER_ID });
            if (fresh.success) state.videoSession = { startTime: fresh.startTime, signature: fresh.signature };
        }
    }, 30000);
}

function closeVideoPlayer() {
    if (state.videoSessionInterval) clearInterval(state.videoSessionInterval);
    state.videoSession = null;
    document.getElementById('modal-root').innerHTML = '';
    renderVideoTab();
}

// TASK SECTION — channel-join (verified) + partner-link (non-verified) একই লিস্টে
// ══════════════════════════════════════════════════════════════
async function renderTaskTab() {
    removeFloatingLootbox();
    const root = document.getElementById('tab-content');
    root.innerHTML = `
        <div class="section-pad" style="margin-top:18px;">
            <div class="section-title" style="margin-bottom:14px;">টাস্ক সম্পন্ন করে WTC জিতুন</div>
            <div style="display:flex; flex-direction:column; gap:10px;" id="task-list">
                <div class="muted" style="text-align:center; padding:20px 0;">লোড হচ্ছে...</div>
            </div>
        </div>`;

    const r = await apiGet('data?type=tasks');
    state.tasks = r.ok ? r.tasks : [];
    const list = document.getElementById('task-list');
    const done = new Set(state.user?.completedTasks || []);

    if (!state.tasks.length) {
        list.innerHTML = `<div class="muted" style="text-align:center; padding:20px 0;">এখনো কোনো টাস্ক নেই।</div>`;
        return;
    }

    list.innerHTML = state.tasks.map(t => {
        const isDone = done.has(t._id);
        const verified = t.category === 'channel';
        return `
        <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <div style="flex:1; min-width:0;">
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
                    <span class="pill ${verified ? 'pill-signal' : 'pill-coin'}">${verified ? '✓ Verified' : 'Link'}</span>
                </div>
                <div style="font-weight:500; font-size:14px;">${t.title}</div>
                <div class="muted" style="font-size:12px; margin-top:2px;">+${t.rewardWtc || 0} WTC</div>
            </div>
            ${isDone
                ? `<span class="pill" style="background:rgba(93,202,165,0.14); color:var(--success);">সম্পন্ন</span>`
                : `<button class="btn btn-primary" style="width:auto; padding:0 16px;" data-task="${t._id}" data-url="${t.url || ''}">যান</button>`
            }
        </div>`;
    }).join('');

    list.querySelectorAll('button[data-task]').forEach(btn => {
        btn.onclick = () => goToTask(btn.dataset.task, btn.dataset.url);
    });
}

function goToTask(taskId, url) {
    if (url) window.open(url, '_blank');
    setTimeout(() => completeTask(taskId), 1500); // লিংকে যাওয়ার পর একটু সময় দিয়ে verify
}

async function completeTask(taskId) {
    const r = await apiPost('earn', { action: 'taskComplete', userId: USER_ID, taskId });
    if (r.ok) {
        toast(`+${r.rewardWtc} WTC যুক্ত হয়েছে!`, 'success');
        await refreshUser();
        renderTaskTab();
    } else if (r.alreadyDone) {
        toast('এই টাস্ক আগেই সম্পন্ন করেছেন।', 'info');
        renderTaskTab();
    } else if (r.error === 'not_member') {
        toast('চ্যানেল/গ্রুপে join করার পর আবার চেষ্টা করুন।', 'error');
    } else {
        toast(errorText(r.error), 'error');
    }
}

// ── device fingerprint (client/fingerprint.js এর লজিক এখানে ইনলাইন করা) ──
async function generateDeviceFingerprint() {
    try {
        const parts = [];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 50;
        ctx.textBaseline = 'top'; ctx.font = '14px Arial'; ctx.fillStyle = '#f60'; ctx.fillRect(0, 0, 100, 20);
        ctx.fillStyle = '#069'; ctx.fillText('NEWTUBE-fp', 2, 15);
        parts.push(canvas.toDataURL());
        parts.push(screen.width + 'x' + screen.height + 'x' + screen.colorDepth);
        parts.push(navigator.language || '');
        parts.push(Intl.DateTimeFormat().resolvedOptions().timeZone || '');
        parts.push(navigator.hardwareConcurrency || '');
        const data = new TextEncoder().encode(parts.join('|||'));
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    } catch { return null; }
}
